// ============================================================ CANVAS
// Display canvas (events + final blit target). All draw code renders to the VIRTUAL
// back-buffer `ctx`/`vcanvas`; each frame we integer-scale it onto the display via blit().
const canvas = document.getElementById('game');            // display element
const dctx = canvas.getContext('2d', { alpha:false });     // display context (blit target)
const vcanvas = document.createElement('canvas');          // virtual back-buffer
const ctx = vcanvas.getContext('2d', { alpha:false });     // <- all game drawing uses this
const fireBtn = document.getElementById('fireBtn');
const IS_MOBILE = matchMedia('(pointer: coarse)').matches;
// The SIM runs in a fixed WORLD_H-tall world (device-independent feel/difficulty). Each frame the
// whole world renders under a WS = VH/WORLD_H transform into a low-res VW×VH virtual buffer, then
// integer-scales (nearest-neighbor, S) onto the display for a crisp pixel-art look.
const TARGET_VH = 224, WORLD_H = 720;
let W=0,H=0,DPR=1,UI=1,VW=0,VH=0,S=1,WS=1;
const VIEW = { x:0, y:0, scale:1 };   // client-CSS -> world mapping for pointer hit-testing
function resize(){
  const vv = window.visualViewport;
  const cssW = Math.round(vv ? vv.width : window.innerWidth);
  const cssH = Math.round(vv ? vv.height : window.innerHeight);
  DPR = Math.min(window.devicePixelRatio||1, 2);
  const devW = Math.round(cssW*DPR), devH = Math.round(cssH*DPR);
  S  = Math.max(1, Math.floor(devH / TARGET_VH));   // integer display scale, in device px
  VH = Math.ceil(devH / S);
  VW = Math.round(U.clamp(Math.ceil(devW / S), 140, 640));
  vcanvas.width = VW; vcanvas.height = VH;
  ctx.imageSmoothingEnabled = false;
  WS = VH / WORLD_H;                 // world -> virtual scale
  H = WORLD_H; W = VW / WS;          // sim space: H fixed, W follows the aspect ratio
  canvas.width = VW*S; canvas.height = VH*S;   // display backing = exact integer multiple
  const cw = VW*S/DPR, ch = VH*S/DPR;
  canvas.style.width = cw+'px'; canvas.style.height = ch+'px';
  canvas.style.marginLeft = Math.round((cssW-cw)/2)+'px';
  canvas.style.marginTop  = Math.round((cssH-ch)/2)+'px';
  dctx.imageSmoothingEnabled = false;
  UI = U.clamp(Math.min(W,H)/560, 0.7, 1.15);
  VIEW.x = (cssW-cw)/2; VIEW.y = (cssH-ch)/2; VIEW.scale = cw/W;
}
function blit(){
  dctx.setTransform(1,0,0,1,0,0);
  dctx.imageSmoothingEnabled = false;
  dctx.drawImage(vcanvas, 0,0,VW,VH, 0,0, canvas.width, canvas.height);
}

const toWY = c => (c - VIEW.y)/VIEW.scale;

// ============================================================ PIXEL FONT (baked point cache)
const off = document.createElement('canvas'), offc = off.getContext('2d');
const PIX_FONT = 'bold 16px "Courier New", monospace';
const pixCache = {};
function getPixels(text){
  if(pixCache[text]) return pixCache[text];
  offc.font = PIX_FONT;
  const w = Math.max(1, Math.ceil(offc.measureText(text).width));
  off.width = w+2; off.height = 20;
  offc.font = PIX_FONT; offc.textBaseline='top'; offc.fillStyle='#fff';
  offc.clearRect(0,0,off.width,off.height); offc.fillText(text,1,2);
  const img = offc.getImageData(0,0,off.width,off.height), pts=[];
  for(let py=0;py<img.height;py++) for(let px=0;px<img.width;px++)
    if(img.data[(py*img.width+px)*4+3]>128) pts.push([px,py]);
  return pixCache[text]={pts,w:img.width,h:img.height};
}
// World-space API preserved (callers pass world coords), but glyph pixels are rendered as
// integer-snapped rects in VIRTUAL space -> crisp pixel text at any scale.
function pixText(text, cx, topY, maxW, color, shadow, maxCell, align){
  const {pts,w}=getPixels(text);
  const cell = Math.max(2, Math.min(maxCell||8, Math.floor(maxW/w)));   // world cell (return contract)
  const cv = Math.max(1, Math.round(cell*WS));                          // integer virtual cell
  const gwv = w*cv;
  const sx = align==='left' ? Math.round(cx*WS) : Math.round(cx*WS - gwv/2);
  const sy = Math.round(topY*WS);
  ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.imageSmoothingEnabled=false;
  if(shadow){ ctx.fillStyle=shadow; for(const p of pts) ctx.fillRect(sx+p[0]*cv+cv, sy+p[1]*cv+cv, cv, cv); }
  ctx.fillStyle=color; for(const p of pts) ctx.fillRect(sx+p[0]*cv, sy+p[1]*cv, cv, cv);
  ctx.restore();
  return { cell, w:w*cell, h:20*cell, x: align==='left'?cx:cx-(w*cell)/2 };
}

// ============================================================ GLOW SPRITE (prerendered, additive)
const glow = document.createElement('canvas'); glow.width=glow.height=64;
(()=>{ const g=glow.getContext('2d'); const grd=g.createRadialGradient(32,32,0,32,32,32);
  grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.35,'rgba(255,255,255,0.55)');
  grd.addColorStop(1,'rgba(255,255,255,0)'); g.fillStyle=grd; g.fillRect(0,0,64,64); })();
function drawGlow(x,y,r,color,alpha){
  ctx.globalAlpha=alpha; ctx.drawImage(tintGlow(color), x-r, y-r, r*2, r*2); ctx.globalAlpha=1;
}
const tintCache={};
function tintGlow(color){
  if(tintCache[color]) return tintCache[color];
  const c=document.createElement('canvas'); c.width=c.height=64; const g=c.getContext('2d');
  g.drawImage(glow,0,0); g.globalCompositeOperation='source-in'; g.fillStyle=color; g.fillRect(0,0,64,64);
  return tintCache[color]=c;
}

// ============================================================ TRAIL PALETTES
const TRAIL_HUE = { gold:45, ice:190, plasma:315 };
function trailColor(id, t, tick){
  if(id==='neon') return `hsl(${(tick*6)%360},100%,${55+t*25}%)`;
  const h=TRAIL_HUE[id]; return `hsl(${h},100%,${50+t*30}%)`;
}
function trailGlowColor(id, tick){
  if(id==='neon') return `hsl(${(tick*6)%360},100%,60%)`;
  return `hsl(${TRAIL_HUE[id]},100%,60%)`;
}

// ============================================================ PARTICLES (pooled)
const Particles = (() => {
  const cap = IS_MOBILE ? Config.PARTICLE_CAP_MOBILE : Config.PARTICLE_CAP_DESKTOP;
  let CAP = cap;
  const pool = new Array(cap);
  for(let i=0;i<cap;i++) pool[i]={active:false};
  let head=0;
  function spawn(o){
    // find slot (kill-oldest via ring)
    let p=null;
    for(let i=0;i<CAP;i++){ const idx=(head+i)%CAP; if(!pool[idx].active){ p=pool[idx]; head=(idx+1)%CAP; break; } }
    if(!p){ p=pool[head]; head=(head+1)%CAP; }
    p.active=true; p.x=o.x; p.y=o.y; p.vx=o.vx||0; p.vy=o.vy||0; p.g=o.g||0;
    p.life=o.life; p.max=o.life; p.r=o.r||3; p.col=o.col||'#fff'; p.kind=o.kind||'spark';
    p.hue=o.hue||0; p.trail=o.trail||null; p.spin=o.spin||0; p.rot=o.rot||0;
    return p;
  }
  function update(){
    for(let i=0;i<CAP;i++){ const p=pool[i]; if(!p.active) continue;
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.rot+=p.spin; p.life--;
      if(p.kind==='spark'){ p.vx*=0.94; p.vy*=0.94; }
      if(p.life<=0) p.active=false;
    }
  }
  function drawNormal(){
    for(let i=0;i<CAP;i++){ const p=pool[i]; if(!p.active||p.kind==='glow'||p.kind==='trail') continue;
      const t=p.life/p.max; ctx.globalAlpha=Math.max(0,t);
      if(p.kind==='spark'){ ctx.fillStyle=p.col; ctx.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r); }
      else if(p.kind==='debris'){ ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.col;
        ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2); ctx.restore(); }
      else if(p.kind==='smoke'){ ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(1.4-t),0,7); ctx.fill(); }
    }
    ctx.globalAlpha=1;
  }
  function drawAdditive(tick){
    ctx.globalCompositeOperation='lighter';
    for(let i=0;i<CAP;i++){ const p=pool[i]; if(!p.active) continue;
      const t=p.life/p.max;
      if(p.kind==='trail'){ const r=3+t*10;
        drawGlow(p.x,p.y,r*1.6, trailGlowColor(p.trail,p.hue), t*0.5);
        ctx.globalAlpha=t*0.9; ctx.fillStyle=trailColor(p.trail,t,p.hue);
        ctx.beginPath(); ctx.arc(p.x,p.y,r,0,7); ctx.fill();
        ctx.globalAlpha=t*0.8; ctx.fillStyle='#fff';
        ctx.beginPath(); ctx.arc(p.x,p.y,r*0.35,0,7); ctx.fill();
      } else if(p.kind==='glow'){ drawGlow(p.x,p.y,p.r*(0.6+t), p.col, t); }
    }
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
  }
  function clear(){ for(let i=0;i<CAP;i++) pool[i].active=false; }
  function count(){ let n=0; for(let i=0;i<CAP;i++) if(pool[i].active) n++; return n; }
  return { spawn, update, drawNormal, drawAdditive, clear, count,
    setCap:(c)=>{CAP=Math.min(cap,Math.max(80,c));}, cap:()=>CAP, maxCap:cap };
})();

function burst(x,y,n,col,opt){ opt=opt||{};
  for(let i=0;i<n;i++){ const a=Math.random()*7, s=U.rand(opt.smin||1,opt.smax||6);
    Particles.spawn({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(opt.up||0),g:opt.g!=null?opt.g:0.18,
      life:U.randi(opt.lmin||22,opt.lmax||40), r:opt.r||3, col:typeof col==='function'?col():col,
      kind:opt.kind||'spark', spin:opt.spin||U.rand(-0.3,0.3)}); }
}
function glowBurst(x,y,n,col){ for(let i=0;i<n;i++){ const a=Math.random()*7,s=U.rand(1,5);
  Particles.spawn({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,g:0,life:U.randi(14,26),r:U.rand(10,22),col,kind:'glow'}); } }

// ============================================================ CAMERA
const Cam = { x:0, y:0, trauma:0, shake(t){ this.trauma=Math.min(1,this.trauma+t); },
  update(dtReal){ this.trauma=Math.max(0,this.trauma-dtReal*0.003);
    const s=this.trauma*this.trauma*(Settings.reduceFx?9:22);
    this.x=U.rand(-s,s); this.y=U.rand(-s,s); }};

// ============================================================ AUDIO
const Audio = (() => {
  let ac=null, master=null, comp=null, musicGain=null, sfxGain=null, ready=false;
  const buffers={};
  const buses={};
  let schedTimer=null, nextTime=0, step=0, playing=false;
  let intensity=0, targetIntensity=0;
  let rotorOsc=null, rotorGain=null, rotorFilter=null;
  let lp=null; // lowpass for slow-mo
  const NOTES = (n)=>440*Math.pow(2,(n-69)/12);
  // ---- chiptune song bank (each is one 16-step bar of bass / arp / lead, looped) ----
  // null = rest. leadWave/arpWave pick the timbre. Tracks are switched per biome and
  // a dedicated driving track plays during the bonus stage.
  const SONGS = [
    { name:'SKY DRIVE', bpm:132, arpWave:'square', leadWave:'sawtooth',
      bass:[45,null,45,null,52,null,45,null,43,null,43,null,50,null,48,null],
      arp :[69,72,76,72,69,72,76,79,67,71,74,71,64,67,72,67],
      lead:[null,null,84,null,null,81,null,null,null,79,null,null,76,null,null,null] },
    { name:'CRYSTAL DREAM', bpm:126, arpWave:'triangle', leadWave:'triangle',
      bass:[40,null,40,null,47,null,40,null,38,null,45,null,43,null,47,null],
      arp :[64,67,71,67,64,67,71,74,62,66,69,66,59,62,67,62],
      lead:[null,null,88,null,83,null,null,79,null,84,null,null,81,null,null,null] },
    { name:'NEON NITRO', bpm:150, arpWave:'square', leadWave:'sawtooth',
      bass:[38,null,38,45,null,38,45,null,36,null,36,43,null,41,null,45],
      arp :[62,65,69,65,62,65,69,72,60,64,67,64,58,62,65,62],
      lead:[null,86,null,null,81,null,84,null,null,79,null,77,null,74,null,null] },
    { name:'SUNSET CRUISE', bpm:118, arpWave:'triangle', leadWave:'triangle',
      bass:[36,null,null,43,null,36,null,43,41,null,null,48,null,41,null,43],
      arp :[60,64,67,64,60,64,67,72,65,69,72,69,67,64,60,64],
      lead:[72,null,null,76,null,null,79,null,null,77,null,null,74,null,72,null] },
    { name:'BOSS BLASTER', bpm:144, arpWave:'square', leadWave:'sawtooth',
      bass:[43,null,43,50,null,43,50,null,47,null,47,54,null,45,null,50],
      arp :[67,71,74,71,67,71,74,79,66,69,74,69,62,67,71,67],
      lead:[79,null,83,null,86,null,83,null,null,81,null,78,null,74,null,null] },
    // driving track for the top-down bonus stage
    { name:'WARP DRIVE', bpm:162, arpWave:'square', leadWave:'sawtooth',
      bass:[45,45,52,45,44,44,51,44,43,43,50,43,45,52,55,57],
      arp :[69,76,72,79,69,76,72,81,68,75,71,78,69,76,72,84],
      lead:[81,null,84,null,88,null,84,null,86,null,83,null,81,null,79,null] }
  ];
  let songIdx=0, prevSongIdx=0;
  let STEP=60/SONGS[0].bpm/4;

  function init(){
    if(ac) return;
    const AC = window.AudioContext||window.webkitAudioContext; if(!AC) return;
    ac = new AC();
    master = ac.createGain(); master.gain.value = Save.get('muted')?0:0.42;
    comp = ac.createDynamicsCompressor();
    lp = ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=20000;
    comp.connect(lp); lp.connect(master); master.connect(ac.destination);
    musicGain = ac.createGain(); musicGain.gain.value=0.9; musicGain.connect(comp);
    sfxGain = ac.createGain(); sfxGain.gain.value=0.9; sfxGain.connect(comp);
    for(const b of ['pad','bass','arp','lead','drums']){ buses[b]=ac.createGain(); buses[b].gain.value=0; buses[b].connect(musicGain); }
    buses.pad.gain.value=0.0;
    loadSample('milestone', AUDIO_MILESTONE_URI);
    loadSample('shoot', AUDIO_SHOOT_URI);
    loadSample('title', AUDIO_TITLE_URI);
    loadSample('kill', AUDIO_KILL_URI);
    ready=true;
  }
  function ensure(){ if(!ac) init(); if(ac && ac.state==='suspended') ac.resume(); }
  const sampleFailed = {};
  async function loadSample(name, uri){
    try{ const buf=await (await fetch(uri)).arrayBuffer();
      ac.decodeAudioData(buf, b=>{ buffers[name]=b; },
        err=>{ sampleFailed[name]=true; console.warn('audio decode failed:', name, err&&err.message); });
    }catch(e){ sampleFailed[name]=true; console.warn('audio load failed:', name, e&&e.message); }
  }
  function playSample(name, gain){
    if(!ac||!buffers[name]) return;
    const s=ac.createBufferSource(); s.buffer=buffers[name];
    const g=ac.createGain(); g.gain.value=gain==null?1:gain;
    s.connect(g); g.connect(comp); s.start();
  }
  let shootVoices=0;
  function shoot(){ if(!ac) return;
    if(!buffers.shoot){ sweep(1200,320,'square',0.09,0.16); return; } // synth fallback if sample unavailable
    if(shootVoices>6) return;
    const s=ac.createBufferSource(); s.buffer=buffers.shoot;
    const g=ac.createGain(); g.gain.value=0.55; s.connect(g); g.connect(sfxGain);
    shootVoices++; s.onended=()=>shootVoices--; s.start();
  }
  function milestone(){ if(buffers.milestone) playSample('milestone', 1.0); else SFX.milestoneBanner();
    if(musicGain){ const t=ac.currentTime; musicGain.gain.cancelScheduledValues(t);
      musicGain.gain.setValueAtTime(musicGain.gain.value,t); musicGain.gain.linearRampToValueAtTime(0.3,t+0.05);
      musicGain.gain.linearRampToValueAtTime(0.9,t+1.6); } }
  let killVoices=0;
  function killSnd(){ if(!ac) return;
    if(!buffers.kill){ SFX.kill(); return; }          // synth fallback if sample unavailable
    if(killVoices>5) return;
    const s=ac.createBufferSource(); s.buffer=buffers.kill;
    const g=ac.createGain(); g.gain.value=0.8; s.connect(g); g.connect(sfxGain);
    killVoices++; s.onended=()=>killVoices--; s.start(); }

  // ---- synth SFX ----
  function env(g, t, a, d, peak){ g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(peak,t+a);
    g.gain.exponentialRampToValueAtTime(0.0001,t+a+d); }
  function tone(freq, type, dur, peak, dest){ if(!ac) return; const t=ac.currentTime;
    const o=ac.createOscillator(), g=ac.createGain(); o.type=type||'square'; o.frequency.value=freq;
    o.connect(g); g.connect(dest||sfxGain); env(g,t,0.005,dur,peak||0.3); o.start(t); o.stop(t+dur+0.05); }
  function sweep(f1,f2,type,dur,peak){ if(!ac) return; const t=ac.currentTime;
    const o=ac.createOscillator(), g=ac.createGain(); o.type=type||'sine';
    o.frequency.setValueAtTime(f1,t); o.frequency.exponentialRampToValueAtTime(Math.max(20,f2),t+dur);
    o.connect(g); g.connect(sfxGain); env(g,t,0.005,dur,peak||0.3); o.start(t); o.stop(t+dur+0.05); }
  function noiseHit(dur, peak, hp){ if(!ac) return; const t=ac.currentTime;
    const b=ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate); const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const s=ac.createBufferSource(); s.buffer=b; const f=ac.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp||800;
    const g=ac.createGain(); s.connect(f); f.connect(g); g.connect(sfxGain); env(g,t,0.005,dur,peak||0.3); s.start(t); }

  const SFX = {
    coin(){ tone(1320,'square',0.06,0.25); setTimeout(()=>tone(1760,'square',0.08,0.25),60); },
    gem(){ tone(1568,'triangle',0.1,0.3); setTimeout(()=>tone(2093,'triangle',0.12,0.3),70); },
    heart(){ tone(880,'sine',0.1,0.3); setTimeout(()=>tone(1320,'sine',0.14,0.3),80); },
    power(){ sweep(440,1200,'square',0.3,0.28); },
    near(){ noiseHit(0.14,0.18,1200); tone(1975,'sine',0.1,0.16); },
    hit(){ sweep(400,60,'sawtooth',0.25,0.4); noiseHit(0.2,0.3,300); },
    explode(){ sweep(300,40,'square',0.3,0.4); noiseHit(0.3,0.35,200); },
    kill(){ tone(660,'square',0.05,0.25); setTimeout(()=>tone(990,'square',0.07,0.22),40); },
    coinInsert(){ tone(988,'square',0.06,0.3); setTimeout(()=>tone(1319,'square',0.06,0.3),70);
      setTimeout(()=>tone(1568,'square',0.12,0.3),140); },
    blip(){ tone(660,'square',0.04,0.2); },
    shield(){ sweep(200,900,'sine',0.25,0.3); noiseHit(0.15,0.2,2000); },
    milestoneBanner(){ tone(1046,'square',0.1,0.3); setTimeout(()=>tone(1318,'square',0.1,0.3),100);
      setTimeout(()=>tone(1568,'square',0.2,0.3),200); }
  };

  // ---- music scheduler ----
  function scheduleStep(s, time){
    const it = intensity;
    // drums
    if(it>0.02){
      if(s%4===0){ // kick
        const o=ac.createOscillator(),g=ac.createGain(); o.type='sine';
        o.frequency.setValueAtTime(150,time); o.frequency.exponentialRampToValueAtTime(50,time+0.12);
        o.connect(g); g.connect(buses.drums); env(g,time,0.005,0.12,0.9); o.start(time); o.stop(time+0.2); }
      if(s%8===4){ const b=ac.createBuffer(1,ac.sampleRate*0.2,ac.sampleRate),d=b.getChannelData(0);
        for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; const src=ac.createBufferSource();src.buffer=b;
        const f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=1000;const g=ac.createGain();
        src.connect(f);f.connect(g);g.connect(buses.drums);env(g,time,0.005,0.15,0.5);src.start(time); }
      if(it>0.4 && s%2===0){ const b=ac.createBuffer(1,ac.sampleRate*0.05,ac.sampleRate),d=b.getChannelData(0);
        for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; const src=ac.createBufferSource();src.buffer=b;
        const f=ac.createBiquadFilter();f.type='highpass';f.frequency.value=6000;const g=ac.createGain();
        src.connect(f);f.connect(g);g.connect(buses.drums);env(g,time,0.002,0.04,0.25);src.start(time); }
    }
    const song=SONGS[songIdx];
    const bn=song.bass[s]; if(bn){ const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle';
      o.frequency.value=NOTES(bn); o.connect(g); g.connect(buses.bass); env(g,time,0.01,STEP*0.9,0.6); o.start(time); o.stop(time+STEP); }
    const an=song.arp[s]; if(an){ const o=ac.createOscillator(),g=ac.createGain(); o.type=song.arpWave||'square';
      o.frequency.value=NOTES(an); o.connect(g); g.connect(buses.arp); env(g,time,0.005,STEP*0.7,0.28); o.start(time); o.stop(time+STEP); }
    const ln=song.lead[s]; if(ln){ const o=ac.createOscillator(),g=ac.createGain(); o.type=song.leadWave||'sawtooth';
      o.frequency.value=NOTES(ln); o.connect(g); g.connect(buses.lead); env(g,time,0.01,STEP*1.6,0.22); o.start(time); o.stop(time+STEP*2); }
  }
  function scheduler(){
    if(!ac) return;
    // smooth intensity + layer gains
    intensity += (targetIntensity-intensity)*0.05;
    const t=ac.currentTime;
    setBus('pad', 0.18);
    setBus('bass', intensity>0.02?0.8:0);
    setBus('drums', intensity>0.02?0.9:0);
    setBus('arp', intensity>0.25?0.7:0);
    setBus('lead', intensity>0.6?0.8:0);
    while(nextTime < ac.currentTime + 0.1){
      scheduleStep(step, nextTime); nextTime+=STEP; step=(step+1)%16;
    }
  }
  function setBus(name,v){ if(buses[name]) buses[name].gain.setTargetAtTime(v, ac.currentTime, 0.2); }
  function startMusic(){ if(!ac||playing) return; playing=true; nextTime=ac.currentTime+0.1; step=0;
    schedTimer=setInterval(scheduler,25); }
  function stopMusic(){ playing=false; if(schedTimer) clearInterval(schedTimer); schedTimer=null;
    for(const b in buses) setBus(b,0); }
  function setIntensity(v){ targetIntensity=U.clamp(v,0,1); }
  // switch chiptune track; STEP re-derives from the new song's tempo
  function setSong(i,remember){ if(i==null) return; i=((i%SONGS.length)+SONGS.length)%SONGS.length;
    if(remember) prevSongIdx=songIdx; if(i===songIdx) return; songIdx=i; STEP=60/SONGS[i].bpm/4; }
  function nextSong(){ setSong(songIdx+1); }
  function restoreSong(){ setSong(prevSongIdx); }
  function songName(){ return SONGS[songIdx].name; }

  // rotor hum
  function startRotor(){ if(!ac||rotorOsc) return;
    rotorOsc=ac.createOscillator(); rotorFilter=ac.createBiquadFilter(); rotorGain=ac.createGain();
    rotorOsc.type='sawtooth'; rotorOsc.frequency.value=70; rotorFilter.type='lowpass'; rotorFilter.frequency.value=300;
    rotorGain.gain.value=0.0; rotorOsc.connect(rotorFilter); rotorFilter.connect(rotorGain); rotorGain.connect(sfxGain); rotorOsc.start(); }
  function stopRotor(){ if(rotorGain) rotorGain.gain.setTargetAtTime(0,ac.currentTime,0.05); }
  function rotor(vy, thrust){ if(!rotorOsc) return;
    const f = 60 + Math.abs(vy)*18 + (thrust?40:0);
    rotorOsc.frequency.setTargetAtTime(f, ac.currentTime, 0.03);
    rotorGain.gain.setTargetAtTime(0.06+(thrust?0.05:0), ac.currentTime, 0.05); }
  // title music (looping recorded track)
  let titleSrc=null, titleGain=null, titlePlaying=false;
  function playTitle(){ if(!ac||titlePlaying) return;
    if(!buffers.title){ if(sampleFailed.title && !playing){ startMusic(); setIntensity(0.35); } return; } // chiptune fallback if title track failed to decode
    titleSrc=ac.createBufferSource(); titleSrc.buffer=buffers.title; titleSrc.loop=true;
    titleGain=ac.createGain(); titleGain.gain.value=0.0; titleSrc.connect(titleGain); titleGain.connect(comp);
    titleGain.gain.setTargetAtTime(0.7, ac.currentTime, 0.3); titleSrc.start(); titlePlaying=true; }
  function stopTitle(){ if(!titlePlaying) return; titlePlaying=false;
    try{ titleGain.gain.setTargetAtTime(0, ac.currentTime, 0.2); const s=titleSrc; setTimeout(()=>{try{s.stop();}catch(e){}},400); }catch(e){} titleSrc=null; }
  function slowmo(on){ if(lp) lp.frequency.setTargetAtTime(on?900:20000, ac.currentTime, 0.05); }
  function setMuted(m){ if(master) master.gain.setTargetAtTime(m?0:0.42, ac.currentTime, 0.05); }
  function suspend(){ if(ac&&ac.state==='running') ac.suspend(); }
  function resume(){ if(ac&&ac.state==='suspended') ac.resume(); }
  return { ensure, SFX, milestone, shoot, killSnd, startMusic, stopMusic, setIntensity,
    setSong, nextSong, restoreSong, songName, songCount:()=>SONGS.length,
    startRotor, stopRotor, rotor, slowmo, setMuted, suspend, resume, isReady:()=>ready,
    playTitle, stopTitle };
})();

// ============================================================ SETTINGS
const Settings = { muted:Save.get('muted'), reduceFx:Save.get('reduceFx'), showFps:false, crt:true };

// ============================================================ GAME STATE
const MODE = { TITLE:'title', GARAGE:'garage', PLAYING:'playing', DEAD:'dead' };
let mode = 'boot';
let insertT = 0, insertFrom = null;   // coin-insert transition
let bootT = 0, idleT = 0;             // boot sequence / title idle-to-attract
let fx = null;                        // screen transition overlay
let entry = null;                     // hi-score initials entry state
function startTransition(toMode, onMid){ if(fx) return;
  fx = { t:0, dur:26, half:false, onMid: onMid || (()=>{ mode=toMode; }) }; }
let tick = 0;                          // sim ticks in a run
let anim = 0;                          // global anim counter (always increments)

const game = {};
function resetRun(){
  game.hy = H/2; game.vy = 0; game.hx = Math.max(120, W*0.18); game.dist = 0; game.score = 0;
  game.maxHp = Config.BASE_HP + Save.upLevel('maxhp');
  game.hp = game.maxHp;
  game.iframe = 0; game.combo = 0; game.comboT = 0; game.mult = 1;
  game.obstacles=[]; game.baddies=[]; game.bullets=[]; game.pickups=[]; game.powerups=[]; game.lasers=[];
  game.banners=[]; game.blimp=null;
  game.spawnT = 90; game.badT=140; game.puT=600; game.laserT=900; game.blimpT=2600;
  game.fireCd = 0; game.fireBurst=0; game.shield=0; game.magnet=0; game.slowmoPU=0; game.launched=false;
  game.biome = 0; game.nextBiomeScore = Config.BIOME_LEN; game.milestone=0; game.trackIdx=0;
  game.revives = 0; game.regenT = 0; game.wave = 1; game.demo = false; game.warnPending = false;
  game.tutorial = 220;   // grace ticks, no spawns
  game.phase = 'side'; game.top = null; game.phaseT = 0; game.bonusCount = 0;
  game.flipNeedsCapture = false; game.flipA = null; game.flipB = null;
  game.shmupT = SHMUP_FIRST;   // ticks until the first bonus stage
  Particles.clear();
  tick = 0;
}

// timing
let timeScale=1, slowmoT=0, hitstopT=0, flash=0, flashCol='#fff';
function doHitstop(ms){ hitstopT=Math.max(hitstopT,ms); }
function doSlowmo(ms){ slowmoT=Math.max(slowmoT,ms); }
function doFlash(c,a){ flash=Math.max(flash,a); flashCol=c; }

// ============================================================ SPAWNING
function speedNow(){ const d=game.dist/1000; return Config.BASE_SPEED*(1+0.14*(1-Math.exp(-d/6))); }
// gap starts huge (easy) and narrows with distance (progressive difficulty)
function gapNow(){ const d=game.dist/1000; return U.lerp(H*0.62, Math.max(150,H*0.28), U.clamp(d/9,0,1)); }
function spawnEveryNow(){ const d=game.dist/1000; return U.lerp(120,46,U.clamp((d-0.2)/9,0,1)); }
let lastMid = 0;
function spawnObstacle(){
  const top=Config.BORDER, bot=H-Config.BORDER, playH=bot-top;
  const gap=U.clamp(gapNow(), 150, playH-60);
  if(!lastMid) lastMid=H/2;
  const d=game.dist/1000;
  // NAVIGABILITY: bound how far the gap-centre can move between spawns to what the
  // helicopter can physically climb/dive in the horizontal time between pipes.
  const reach=Config.MAX_VY*spawnEveryNow()*0.5;
  const maxShift=Math.min(reach, playH*0.42);
  let mid=U.clamp(lastMid+U.rand(-maxShift,maxShift), top+gap/2+16, bot-gap/2-16);
  lastMid=mid;
  const w=U.rand(70,110);
  // paired pipes, STATIC and flush to the borders (no bob = never a sky gap at the edge).
  // The clear corridor is the gap between them, and it's always reachable.
  const topH=mid-gap/2-top;
  if(topH>24) game.obstacles.push({kind:'pipe',fromTop:true, x:W+60,y:top, w,h:topH,amp:0,phase:0,freq:0,drawY:top, grazed:false});
  const botY=mid+gap/2, botH=bot-botY;
  if(botH>24) game.obstacles.push({kind:'pipe',fromTop:false,x:W+60,y:botY,w,h:botH,amp:0,phase:0,freq:0,drawY:botY,grazed:false});
  // once it's harder, a bobbing saw may hang inside a WIDE gap (never fully blocks the path)
  if(d>1.4 && gap>playH*0.36 && U.chance(0.4)){
    game.obstacles.push({kind:'saw', x:W+w+U.rand(140,260), y:mid, r:30, rot:0,
      amp:U.rand(10,gap*0.18), phase:Math.random()*7, freq:U.rand(0.012,0.028), drawY:mid});
  }
}
function spawnBaddie(){
  const top=Config.BORDER+30, bot=H-Config.BORDER-30;
  const r=Math.random();
  let type='drone', hp=1;
  if(r<0.5) type='drone'; else if(r<0.82){type='weaver';} else {type='bruiser';hp=3;}
  const y=U.rand(top,bot);
  game.baddies.push({type,hp,maxhp:hp, x:W+40, y, y0:y, vx:-(speedNow()*U.rand(0.9,1.4)),
    phase:Math.random()*7, amp:type==='weaver'?U.rand(40,90):0, freq:U.rand(0.03,0.06), r:type==='bruiser'?26:18, hitFlash:0});
}
function spawnPickup(){
  const top=Config.BORDER+30, bot=H-Config.BORDER-30;
  // a small arc of coins
  const n=U.randi(3,6), y0=U.rand(top+40,bot-40), amp=U.rand(-40,40);
  for(let i=0;i<n;i++) game.pickups.push({kind: U.chance(0.12)?'gem':(U.chance(0.05)?'heart':'coin'),
    x:W+40+i*34, y:y0+Math.sin(i/n*Math.PI)*amp, r:12, got:false});
}
function spawnPowerup(){
  const kinds=['shield','magnet','slowmo'];
  game.powerups.push({kind:U.pick(kinds), x:W+40, y:U.rand(Config.BORDER+50,H-Config.BORDER-50), r:18, phase:Math.random()*7});
}
function spawnLaser(){
  const y=U.rand(Config.BORDER+60, H-Config.BORDER-60);
  game.lasers.push({y, warn:80, active:0, done:false});
}
function spawnBlimp(){
  game.blimp={ x:W+120, y:H*0.28, w:180, h:90, hp:14, maxhp:14, dropT:40, hitFlash:0, leaving:false };
  Audio.SFX.milestoneBanner(); Audio.setSong(4,true);   // BOSS BLASTER track (WARNING banner handled at spawn trigger)
}

// ============================================================ BANNERS
function pushBanner(text, o){ if(typeof o==='string') o={col:o}; o=o||{};
  game.banners.push({ text, sub:o.sub||'', col:o.col||'#ffe14d', flash:!!o.flash,
    onEnd:o.onEnd||null, life:o.dur||140, max:o.dur||140 }); }

// ============================================================ STEP (one fixed sim tick)
function step(){
  tick++;
  const spd = speedNow();
  game.hx = Math.max(120, W*0.18);

  // LAUNCH GATE: at the start Henry flies level (horizontal). Nothing happens until the
  // player first presses to fly — then gravity/controls kick in and the run really begins.
  if(!game.launched){
    Particles.spawn({x:game.hx-24,y:game.hy+2,vx:-spd*0.35,vy:0,life:85,kind:'trail',trail:Save.get('trail'),hue:anim});
    if(Input.fly) game.launched=true;
    else { game.vy=0; return; }
  }

  // physics
  const handling = 1 + Save.upLevel('handling')*0.06;
  game.vy += Config.GRAVITY;
  if(Input.fly) game.vy += Config.LIFT*handling;
  game.vy = U.clamp(game.vy, -Config.MAX_VY*handling, Config.MAX_VY*handling);
  game.hy += game.vy;
  const topL=Config.BORDER+8, botL=H-Config.BORDER-8;
  if(game.hy<topL){ game.hy=topL; if(game.vy<0) game.vy=0; }
  if(game.hy>botL){ game.hy=botL; if(game.vy>0) game.vy=0; }
  const hx = game.hx;

  // long neon trail
  Particles.spawn({x:hx-24,y:game.hy+2,vx:-spd*0.35,vy:0,life:85,kind:'trail',trail:Save.get('trail'),hue:anim});

  // firing
  if(game.fireCd>0) game.fireCd--;
  if(game.fireBurst>0) game.fireBurst--;
  const firing = Input.fire || game.fireBurst>0;
  const fireInt = Math.max(4, Config.FIRE_INTERVAL - Save.upLevel('firerate')*2);
  if(firing && game.fireCd<=0){
    game.bullets.push({x:hx+24,y:game.hy-2,vx:Config.BULLET_SPEED,life:120});
    game.fireCd=fireInt; Audio.shoot();
    Particles.spawn({x:hx+30,y:game.hy-2,life:8,r:16,col:'#fff6a0',kind:'glow'});
  }
  for(const b of game.bullets){ b.x+=b.vx; b.life--; }
  game.bullets=game.bullets.filter(b=>b.life>0 && b.x<W+40);

  // scroll + move obstacles
  game.dist += spd;
  for(const o of game.obstacles){ o.x-=spd; const bob=Math.sin(tick*o.freq+o.phase)*o.amp;
    if(o.kind==='saw'){ o.rot+=0.15; o.drawY=o.y+bob; } else o.drawY=o.y+bob; }
  game.obstacles=game.obstacles.filter(o=>o.x+(o.w||o.r*2)> -30);

  // baddies
  for(const b of game.baddies){ b.x+=b.vx; if(b.amp) b.y=b.y0+Math.sin(tick*b.freq+b.phase)*b.amp; if(b.hitFlash>0)b.hitFlash--; }
  game.baddies=game.baddies.filter(b=>b.x> -40 && b.hp>0);

  // pickups
  const magR = 60 + Save.upLevel('magnet')*55 + (game.magnet>0?260:0);
  for(const p of game.pickups){ p.x-=spd;
    const dx=game.hx-p.x, dy=game.hy-p.y, dd=Math.hypot(dx,dy);
    if(dd<magR){ p.x+=dx/dd*Math.min(8,magR/22); p.y+=dy/dd*Math.min(8,magR/22); } }
  game.pickups=game.pickups.filter(p=>p.x>-30 && !p.got);

  // powerups
  for(const p of game.powerups){ p.x-=spd; }
  game.powerups=game.powerups.filter(p=>p.x>-30);

  // lasers (screen-space telegraphed)
  for(const L of game.lasers){ if(L.warn>0){ L.warn--; if(L.warn===0){ L.active=26; Audio.SFX.hit(); } }
    else if(L.active>0){ L.active--; if(L.active===0) L.done=true; } }
  game.lasers=game.lasers.filter(L=>!L.done);

  // blimp
  if(game.blimp){ const bl=game.blimp;
    if(bl.leaving){ bl.x-=spd*1.4; if(bl.x<-bl.w) game.blimp=null; }
    else { bl.x = U.lerp(bl.x, W*0.6, 0.02); if(bl.hitFlash>0)bl.hitFlash--;
      bl.dropT--; if(bl.dropT<=0){ bl.dropT=U.randi(40,70);
        game.baddies.push({type:'mine', hp:1, maxhp:1, x:bl.x, y:bl.y+bl.h/2, y0:bl.y, vx:0, vy2:U.rand(1.5,3),
          phase:0, amp:0, freq:0, r:14, hitFlash:0, falling:true}); }
    }
  }
  // mines fall
  for(const b of game.baddies){ if(b.falling){ b.y+=b.vy2; } }

  // ---------- spawns (skip during tutorial grace) ----------
  if(game.tutorial>0){ game.tutorial--; }
  else {
    const d=game.dist/1000;
    game.spawnT--; if(game.spawnT<=0){ spawnObstacle(); game.spawnT=spawnEveryNow()+U.rand(-10,14); }
    // hazards layer in as it gets harder (easy start = just pipes with big gaps)
    if(d>0.35){ game.badT--; if(game.badT<=0){ spawnBaddie(); game.badT=U.lerp(180,70,U.clamp(d/9,0,1))+U.rand(-20,30); } }
    game.puT--; if(game.puT<=0){ spawnPickup(); game.puT=U.rand(260,460); }
    if(d>0.6 && U.chance(0.004)) spawnPowerup();
    game.laserT--; if(game.laserT<=0 && d>1.8){ spawnLaser(); game.laserT=U.rand(700,1200); }
    game.blimpT--; if(game.blimpT<=0 && !game.blimp && !game.warnPending && d>2.2){
      game.warnPending=true; game.blimpT=3200;
      pushBanner('WARNING!!', {sub:'INCOMING BOSS', flash:true, dur:96, onEnd:()=>{ game.warnPending=false; if(mode===MODE.PLAYING||mode==='attract') spawnBlimp(); }});
      Audio.SFX.hit(); }
  }

  // ---------- collisions: bullets ----------
  for(const b of game.bullets){
    for(const e of game.baddies){ if(e.hp<=0) continue;
      if(Math.abs(b.x-e.x)<e.r+6 && Math.abs(b.y-e.y)<e.r+6){
        b.life=0; e.hp--; e.hitFlash=6; Audio.SFX.kill();
        burst(b.x,b.y,4,'#fff',{smax:3,lmax:16});
        if(e.hp<=0) killBaddie(e);
        break;
      } }
    if(game.blimp && !game.blimp.leaving){ const bl=game.blimp;
      if(b.x>bl.x-bl.w/2 && b.x<bl.x+bl.w/2 && b.y>bl.y-bl.h/2 && b.y<bl.y+bl.h/2){
        b.life=0; bl.hp--; bl.hitFlash=5; burst(b.x,b.y,5,'#ffcf5a',{smax:4});
        if(bl.hp<=0){ blimpDown(); } } }
  }

  // ---------- collisions: heli vs hazards ----------
  const hb = {x:game.hx-18, y:game.hy-8, w:36, h:16};
  if(game.iframe>0) game.iframe--;

  // obstacles (with near-miss graze)
  for(const o of game.obstacles){
    let ox,oy,ow,oh;
    if(o.kind==='saw'){ ox=o.x-o.r; oy=o.drawY-o.r; ow=o.r*2; oh=o.r*2; }
    else { ox=o.x; oy=o.drawY; ow=o.w; oh=o.h; }
    if(rectHit(hb, ox,oy,ow,oh)){ damage(o.x); }
    else if(!o.grazed && o.kind!=='saw'){
      const gz=20; if(rectHit(hb, ox-gz,oy-gz,ow+gz*2,oh+gz*2) && Math.abs((oy+oh/2)-game.hy)<oh/2+40){
        o.grazed=true; nearMiss(o.x-10, game.hy); } }
  }
  // baddies
  for(const e of game.baddies){ if(e.hp<=0) continue;
    if(Math.abs(game.hx-e.x)<e.r+16 && Math.abs(game.hy-e.y)<e.r+12){ damage(e.x); e.hp--; if(e.hp<=0) killBaddie(e); } }
  // lasers
  for(const L of game.lasers){ if(L.active>0 && Math.abs(game.hy-L.y)<14){ damage(game.hx); } }
  // blimp body
  if(game.blimp && !game.blimp.leaving){ const bl=game.blimp;
    if(rectHit(hb, bl.x-bl.w/2,bl.y-bl.h/2,bl.w,bl.h)) damage(bl.x); }

  // ---------- pickups ----------
  for(const p of game.pickups){ if(p.got) continue;
    if(Math.abs(game.hx-p.x)<p.r+18 && Math.abs(game.hy-p.y)<p.r+14){
      p.got=true; collectPickup(p); } }
  for(let i=game.powerups.length-1;i>=0;i--){ const p=game.powerups[i];
    if(Math.abs(game.hx-p.x)<p.r+20 && Math.abs(game.hy-p.y)<p.r+16){ applyPowerup(p.kind); game.powerups.splice(i,1); } }

  // ---------- power-up timers ----------
  const pd = 1 + Save.upLevel('pwrdur')*0.25;
  if(game.shield>0) game.shield--;
  if(game.magnet>0) game.magnet--;
  if(game.slowmoPU>0){ game.slowmoPU--; doSlowmo(20); }

  // ---------- combo / score ----------
  if(game.comboT>0){ game.comboT--; if(game.comboT<=0) game.combo=Math.floor(game.combo*0.5); }
  game.mult = 1 + game.combo*0.15;
  game.score += 0.5*game.mult;
  Audio.setIntensity(U.clamp(game.combo/20,0,1));

  // milestone every 250
  const ms = Math.floor(game.score / Config.MILESTONE_EVERY);
  if(ms>game.milestone){ game.milestone=ms; onMilestone(); }

  // biome transition
  if(game.score>=game.nextBiomeScore){ game.nextBiomeScore+=Config.BIOME_LEN;
    game.biome=(game.biome+1)%BIOMES.length; onBiome(); }

  // regen
  const regenRate = Save.upLevel('regen');
  if(regenRate>0 && game.hp<game.maxHp){ game.regenT++; if(game.regenT> (900 - regenRate*250)){ game.regenT=0; game.hp++; Audio.SFX.heart(); doFlash('#7cf07c',0.15); } }

  // bonus-stage trigger: kick off the 3D-flip top-down shmup between hazards
  if(game.launched && game.tutorial<=0 && !game.blimp){ game.shmupT--; if(game.shmupT<=0) beginBonusStage(); }
}

function rectHit(a, bx,by,bw,bh){ return a.x<bx+bw && a.x+a.w>bx && a.y<by+bh && a.y+a.h>by; }

function nearMiss(x,y){
  game.combo++; game.comboT=Config.COMBO_WINDOW;
  doSlowmo(120); burst(x,y,6,'#a6f0ff',{smax:5,lmax:22}); Audio.SFX.near();
  pushScorePop(x,y,'NICE');
}
function killBaddie(e){
  burst(e.x,e.y,e.type==='bruiser'?24:14, ()=>U.pick(['#ff6a3c','#ffd166','#fff']), {smax:6,lmax:34,g:0.12});
  glowBurst(e.x,e.y,4,'#ffb347');
  doHitstop(35); Cam.shake(0.25); Audio.SFX.explode(); Audio.killSnd();   // baddie shot dead
  game.combo++; game.comboT=Config.COMBO_WINDOW;
  const pts = e.type==='bruiser'?60:25; game.score+=pts;
  if(e.type==='bruiser') game.pickups.push({kind:'gem',x:e.x,y:e.y,r:12,got:false});
  else if(U.chance(0.6)) game.pickups.push({kind:'coin',x:e.x,y:e.y,r:12,got:false});
  pushScorePop(e.x,e.y,'+'+pts);
}
function blimpDown(){ const bl=game.blimp; bl.leaving=true;
  for(let i=0;i<5;i++) setTimeout(()=>{},0);
  burst(bl.x,bl.y,40,()=>U.pick(['#ff6a3c','#ffd166','#fff']),{smax:9,lmax:50,g:0.1});
  glowBurst(bl.x,bl.y,10,'#ffcf5a'); doHitstop(120); Cam.shake(1); doFlash('#fff',0.5);
  Audio.SFX.explode(); game.score+=500; pushScorePop(bl.x,bl.y,'BOSS +500'); pushBanner('BLIMP DOWN!','#7cf07c'); Audio.restoreSong();
  for(let i=0;i<8;i++) game.pickups.push({kind:U.chance(0.5)?'gem':'coin',x:bl.x+U.rand(-60,60),y:bl.y+U.rand(-30,30),r:12,got:false});
}
function damage(sourceX){
  if(game.iframe>0) return;
  const px=pX(), py=pY();
  if(game.shield>0){ game.shield=0; game.iframe=Config.IFRAME_MS/Config.DT|0;
    doHitstop(140); Cam.shake(0.6); doFlash('#7cf0ff',0.5); Audio.SFX.shield();
    glowBurst(px,py,10,'#7cf0ff'); pushScorePop(px,py,'SHIELD!'); return; }
  game.hp--; game.combo=Math.floor(game.combo*0.5);
  game.iframe=Config.IFRAME_MS/Config.DT|0;
  if(game.phase!=='top') game.vy = (game.hy>H/2? -1: 1)*2;
  doHitstop(60); Cam.shake(0.7); doFlash('#ff3b3b',0.5); Audio.SFX.hit();
  burst(px,py,16,'#ff5a5a',{smax:6});
  if(game.hp<=0) die();
}
function die(){
  mode=MODE.DEAD;
  const px=pX(), py=pY();
  const fs=Math.floor(game.score);
  if(!game.demo){
    if(fs>Save.get('best')) Save.set('best',fs);
    if(Math.floor(game.dist)>Save.get('bestDist')) Save.set('bestDist',Math.floor(game.dist));
    Save.set('runs', Save.get('runs')+1);
  }
  burst(px,py,50,()=>U.pick(['#e52521','#ffe14d','#fff']),{smax:8,lmax:50,g:0.12});
  glowBurst(px,py,12,'#ff7a3c'); doHitstop(200); Cam.shake(1); doFlash('#fff',0.7);
  Audio.SFX.explode(); Audio.setIntensity(0); Audio.stopRotor();
}
function collectPickup(p){
  if(p.kind==='coin'){ if(!game.demo) Save.addCoins(Config.COIN_VAL); game.score+=5; Audio.SFX.coin(); }
  else if(p.kind==='gem'){ if(!game.demo) Save.addCoins(Config.GEM_VAL); game.score+=25; Audio.SFX.gem(); pushScorePop(p.x,p.y,'GEM'); }
  else if(p.kind==='heart'){ if(game.hp<game.maxHp) game.hp++; Audio.SFX.heart(); pushScorePop(p.x,p.y,'+HP'); doFlash('#7cf07c',0.2); }
  game.combo++; game.comboT=Config.COMBO_WINDOW;
  burst(p.x,p.y,6, p.kind==='gem'?'#7cf0ff':'#ffe14d', {smax:4,lmax:20});
}
function applyPowerup(kind){
  const pd = 1 + Save.upLevel('pwrdur')*0.25;
  if(kind==='shield'){ game.shield=1; pushScorePop(game.hx,game.hy,'SHIELD'); }
  else if(kind==='magnet'){ game.magnet=(360*pd)|0; pushScorePop(game.hx,game.hy,'MAGNET'); }
  else if(kind==='slowmo'){ game.slowmoPU=(180*pd)|0; pushScorePop(game.hx,game.hy,'SLOW-MO'); }
  Audio.SFX.power(); glowBurst(game.hx,game.hy,8,'#b19cff'); doFlash('#b19cff',0.25);
}
function onMilestone(){ Audio.milestone(); Cam.shake(0.4); doFlash('#ffe14d',0.35);
  if(!game.demo) Save.addCoins(Config.MILESTONE_COINS);
  pushBanner(game.milestone*Config.MILESTONE_EVERY+' PTS!  +'+Config.MILESTONE_COINS, '#ffe14d');
  glowBurst(game.hx,game.hy,10,'#ffe14d'); }
function onBiome(){ const b=BIOMES[game.biome]; game.wave=(game.wave||1)+1;
  pushBanner('WAVE '+game.wave, {sub:b.name, col:b.borderLite, dur:120});
  Audio.SFX.milestoneBanner(); Cam.shake(0.3); doFlash(b.borderLite,0.3);
  game.trackIdx=((game.trackIdx||0)+1)%5; Audio.setSong(game.trackIdx);   // fresh chiptune each biome
  if(game.hp<game.maxHp){ game.hp++; } }

// score popups (reuse banners list as floaters)
const pops=[];
function pushScorePop(x,y,txt){ pops.push({x,y,txt,life:50,max:50}); }

// ============================================================ BONUS STAGE (3D flip -> top-down shmup)
// Periodically the side-scroller pitches the camera up and over into a short vertical
// shooter where enemies swarm in from the top in squads, a boss appears, then it flips back.
const FLIP_TICKS = 84;          // length of each cinematic flip (in / out) — slow & dramatic
const SHMUP_FIRST = 1100;       // ticks of side play before the first bonus stage (~18s)
const SHMUP_REPEAT = 2000;      // ticks between bonus stages afterwards (~33s)
const WAVE_GAP = 140;           // ticks between enemy waves
const Aim = { x: 0, y: 0, active:false };            // pointer / drag target (top-down)
const keyMove = { up:false, down:false, left:false, right:false };

// which position the active player occupies (side vs top-down) — used by shared FX
function pX(){ return game.phase==='top' && game.top ? game.top.px : game.hx; }
function pY(){ return game.phase==='top' && game.top ? game.top.py : game.hy; }

function makeStars(){ const a=[]; for(let i=0;i<80;i++){ const near=Math.random()<0.5;
  a.push({x:Math.random()*W, y:Math.random()*H, z:near?2:1, a:near?0.9:0.5, spd:near?6.5:3.4}); } return a; }

function tEnemy(o){ return Object.assign({ x:0, y:-30, vx:0, vy:2.6, r:16, hp:2, maxhp:2, t:0,
  phase:0, sway:0, swayF:0.05, shoots:false, fireCd:60, hitFlash:0, pts:20, col:'#ff6a3c',
  big:false, type:'dart', drop:null }, o); }

// enemy formations (squads) — cycled by the wave scheduler. Later bonus stages start
// deeper into the list so the mix escalates each time.
const TOP_WAVES = [
  // 0: V-wing dive, straight down, leader shoots
  (t)=>{ const cx=W/2; for(let i=-2;i<=2;i++) t.enemies.push(tEnemy({ x:cx+i*48, y:-30-Math.abs(i)*42, vy:2.8, shoots:i===0, col:'#ff6a3c', hp:2, type:'dart' })); },
  // 1: sweeping line, swaying side to side (weavers)
  (t)=>{ for(let i=0;i<6;i++) t.enemies.push(tEnemy({ x:W*0.14+i*(W*0.72/5), y:-30-i*18, vy:2.4, sway:80, swayF:0.03, phase:i*0.6, col:'#3cd070', hp:2, pts:20, type:'weaver' })); },
  // 2: dual diagonal strafe from both top corners (fun angles)
  (t)=>{ for(let i=0;i<5;i++) t.enemies.push(tEnemy({ x:-40-i*36, y:H*0.10+i*12, vx:3.4, vy:2.1, r:14, col:'#ffb347', hp:1, pts:15, type:'strafer' }));
         for(let i=0;i<5;i++) t.enemies.push(tEnemy({ x:W+40+i*36, y:H*0.06+i*12, vx:-3.4, vy:2.1, r:14, col:'#ffb347', hp:1, pts:15, type:'strafer' })); },
  // 3: heavy squad of tanks (drop gun power-ups)
  (t)=>{ for(let i=0;i<4;i++) t.enemies.push(tEnemy({ x:W*0.22+i*(W*0.56/3), y:-40-i*34, vy:1.7, hp:5, maxhp:5, r:23, shoots:true, fireCd:50+i*15, col:'#8a5cff', pts:40, big:true, type:'tank', drop:(i===1||i===3)?'gun':null })); },
  // 4: snake column pouring down the centre
  (t)=>{ for(let i=0;i<9;i++) t.enemies.push(tEnemy({ x:W/2, y:-30-i*32, vy:3.0, sway:120, swayF:0.035, phase:i*0.5, r:14, hp:1, col:'#ff6a3c', pts:12, type:'weaver' })); },
  // 5: kamikaze rush — arrows that home toward the player and accelerate
  (t)=>{ for(let i=0;i<6;i++) t.enemies.push(tEnemy({ x:W*0.12+i*(W*0.76/5), y:-40-Math.random()*80, vy:2.2, r:15, hp:1, col:'#ff3b6b', pts:22, type:'kamikaze' })); },
  // 6: orbiter pods circling as they descend (one drops a shield)
  (t)=>{ for(let i=0;i<7;i++) t.enemies.push(tEnemy({ x:W*0.2+i*(W*0.6/6), y:-30-i*22, vy:1.9, r:15, hp:2, col:'#39d0ff', pts:24, type:'orbiter', drop:i===3?'shield':null })); },
  // 7: gunner wall — spaced shooters laying down aimed fire
  (t)=>{ for(let i=0;i<5;i++) t.enemies.push(tEnemy({ x:W*0.12+i*(W*0.76/4), y:-40-((i%2)*40), vy:1.5, hp:3, maxhp:3, r:18, shoots:true, fireCd:40+i*10, col:'#ffd166', pts:30, type:'gunner' })); }
];

// bosses cycle so each bonus stage ends with a different fight
const TOP_BOSSES = [
  { kind:'carrier',   name:'CARRIER',   hp:44 },
  { kind:'saucer',    name:'SAUCER',    hp:52 },
  { kind:'destroyer', name:'DESTROYER', hp:64 }
];

function beginBonusStage(){
  game.bonusCount = (game.bonusCount||0) + 1;
  game.top = { t:0, hardCap:3600, waveT:26, waveIdx:(game.bonusCount-1)%2, wavesLeft:6+Math.min(3,(game.bonusCount-1)),
    enemies:[], ebullets:[], pbullets:[], pickups:[], stars:makeStars(),
    px:W/2, py:H*0.78, fireCd:0, boss:null, bossSpawned:false, kills:0, gun:1 };
  game.phase='in'; game.phaseT=FLIP_TICKS; game.flipNeedsCapture=true;
  Aim.active=false; keyMove.up=keyMove.down=keyMove.left=keyMove.right=false;
  Cam.shake(0.7); doFlash('#7cf0ff',0.6); Audio.SFX.milestoneBanner(); Audio.setSong(5,true); pushBanner('WARP!', '#7cf0ff');
}
function beginFlipOut(){ game.phase='out'; game.phaseT=FLIP_TICKS; game.flipNeedsCapture=true;
  doFlash('#7cf0ff',0.55); Audio.SFX.milestoneBanner(); }
function endBonusStage(){
  const bonus = 120 + (game.top?game.top.kills*8:0);
  game.score += bonus; Save.addCoins(Math.round(bonus/4));
  pushBanner('STAGE CLEAR!  +'+bonus, '#ffe14d'); doFlash('#ffe14d',0.4); Cam.shake(0.35);
  game.phase='side'; game.shmupT = SHMUP_REPEAT; Audio.restoreSong();
  // land safely back in the side-scroller: recentre, brief invulnerability, and make sure
  // there is NO pipe/hazard bearing down — clear the whole lane ahead + a spawn grace period.
  game.hy=H/2; game.vy=0; game.iframe=Math.max(game.iframe,(1800/Config.DT)|0);
  game.obstacles=game.obstacles.filter(o=> (o.x+(o.w||o.r*2)) < game.hx-120 );  // keep only stuff already behind
  game.baddies=[]; game.lasers=[]; game.blimp=null;
  game.tutorial=Math.max(game.tutorial,150);   // ~2.5s of no new spawns to ease back in
  game.spawnT=Math.max(game.spawnT,120);
  game.top=null; game.flipA=null; game.flipB=null;
}
function spawnBossTop(t){
  const def=TOP_BOSSES[(game.bonusCount-1)%TOP_BOSSES.length];
  const hp=def.hp + 8*Math.floor((game.bonusCount-1)/TOP_BOSSES.length);
  const w=(def.kind==='saucer')?150:(def.kind==='destroyer')?Math.min(340,W*0.8):Math.min(280,W*0.62);
  const h=(def.kind==='saucer')?150:(def.kind==='destroyer')?84:96;
  t.boss={ kind:def.kind, name:def.name, x:W/2, y:-h, w, h, hp, maxhp:hp, enter:70, fireCd:50, hitFlash:0, t:0, ang:0 };
  pushBanner('!! '+def.name+' !!','#ff4d4d'); Audio.SFX.milestoneBanner(); Cam.shake(0.5);
}
function dropPickup(t,x,y,kind){ t.pickups.push({x,y,vy:1.4,kind,t:0}); }
function killTop(e){
  burst(e.x,e.y, e.big?22:12, ()=>U.pick(['#ff6a3c','#ffd166','#fff']), {smax:6,lmax:30,g:0.05});
  glowBurst(e.x,e.y,3,'#ffb347'); Audio.SFX.explode(); Audio.killSnd(); doHitstop(16); Cam.shake(0.16);
  game.combo++; game.comboT=Config.COMBO_WINDOW; const pts=e.pts||20; game.score+=pts; game.top.kills++;
  if(e.drop) dropPickup(game.top,e.x,e.y,e.drop);
  else if(U.chance(0.5)) Save.addCoins(1);
  pushScorePop(e.x,e.y,'+'+pts);
}
function bossDownTop(){ const bo=game.top.boss; game.top.boss=null;
  burst(bo.x,bo.y,60,()=>U.pick(['#ff6a3c','#ffd166','#fff']),{smax:9,lmax:60,g:0.05});
  glowBurst(bo.x,bo.y,14,'#ffcf5a'); doHitstop(150); Cam.shake(1.1); doFlash('#fff',0.65); Audio.SFX.explode();
  const rew=600+100*((game.bonusCount-1)%TOP_BOSSES.length);
  game.score+=rew; Save.addCoins(30); pushScorePop(bo.x,bo.y,'BOSS +'+rew); pushBanner(bo.name+' DOWN!','#7cf07c');
}

// player fire pattern scales with the in-stage gun power-up level
function topFire(t){
  const x=t.px, y=t.py-18, gl=t.gun;
  const push=(vx,vy)=>t.pbullets.push({x,y,vx,vy,life:72});
  if(gl<=1){ push(-2,-15); push(2,-15); }
  else if(gl===2){ push(0,-15); push(-2.8,-14.2); push(2.8,-14.2); }
  else if(gl===3){ push(0,-15); push(-2.6,-14.4); push(2.6,-14.4); push(-5.2,-12.8); push(5.2,-12.8); }
  else { push(-1.4,-15); push(1.4,-15); push(-3.6,-14); push(3.6,-14); push(-6,-12.4); push(6,-12.4); }
  Audio.shoot(); Particles.spawn({x,y,life:7,r:14,col:'#fff6a0',kind:'glow'});
}

function topStep(){
  const t=game.top; t.t++;
  for(const s of t.stars){ s.y+=s.spd; if(s.y>H){ s.y-=H; s.x=Math.random()*W; } }
  // player movement: keys (velocity) take priority, else follow pointer/drag
  const spd=6.6;
  if(keyMove.up||keyMove.down||keyMove.left||keyMove.right){
    if(keyMove.left) t.px-=spd; if(keyMove.right) t.px+=spd;
    if(keyMove.up) t.py-=spd; if(keyMove.down) t.py+=spd;
  } else if(Aim.active){ t.px+=(Aim.x-t.px)*0.28; t.py+=(Aim.y-t.py)*0.28; }
  t.px=U.clamp(t.px,24,W-24); t.py=U.clamp(t.py,60,H-40);
  // shared invuln / shield timers
  if(game.iframe>0) game.iframe--; if(game.shield>0) game.shield--;
  // auto fire (pattern by gun level)
  if(t.fireCd>0) t.fireCd--;
  const fi=Math.max(5, 9 - Save.upLevel('firerate')*2);
  if(t.fireCd<=0){ t.fireCd=fi; topFire(t); }
  for(const b of t.pbullets){ b.x+=b.vx; b.y+=b.vy; b.life--; }
  t.pbullets=t.pbullets.filter(b=>b.life>0 && b.y>-20);
  // falling power-ups
  for(const p of t.pickups){ p.t++; p.y+=p.vy; }
  for(let i=t.pickups.length-1;i>=0;i--){ const p=t.pickups[i];
    if(Math.abs(t.px-p.x)<24 && Math.abs(t.py-p.y)<24){
      if(p.kind==='gun'){ t.gun=Math.min(4,t.gun+1); pushBanner('GUN UP!  Lv.'+t.gun,'#ffe14d'); pushScorePop(p.x,p.y,'GUN+'); }
      else { game.shield=Math.max(game.shield,(5000/Config.DT)|0); pushBanner('SHIELD!','#7cf0ff'); pushScorePop(p.x,p.y,'SHIELD'); }
      Audio.SFX.powerup?Audio.SFX.powerup():Audio.SFX.milestoneBanner(); glowBurst(p.x,p.y,4,'#ffe14d'); t.pickups.splice(i,1); continue; }
    if(p.y>H+30) t.pickups.splice(i,1);
  }
  // wave scheduler -> boss
  if(!t.bossSpawned){ t.waveT--; if(t.waveT<=0){
    if(t.wavesLeft>0){ TOP_WAVES[t.waveIdx%TOP_WAVES.length](t); t.waveIdx++; t.wavesLeft--; t.waveT=WAVE_GAP; }
    else if(t.enemies.length<=2){ spawnBossTop(t); t.bossSpawned=true; } else { t.waveT=30; } } }
  // enemies (per-type behaviour)
  for(const e of t.enemies){ e.t++;
    if(e.type==='kamikaze' && e.y>H*0.18){ const dx=t.px-e.x; e.vx=U.clamp(e.vx+U.clamp(dx*0.006,-0.4,0.4),-5,5); e.vy=Math.min(e.vy+0.05,5.6); }
    else if(e.type==='orbiter'){ e.vx=Math.cos(e.t*0.05+e.phase)*3.0; }
    e.y+=e.vy; e.x+=e.vx + (e.sway?Math.sin(e.t*e.swayF+e.phase)*e.sway*0.06:0);
    if(e.hitFlash>0) e.hitFlash--;
    if(e.shoots){ e.fireCd--; if(e.fireCd<=0 && e.y>0 && e.y<H*0.72){ e.fireCd=U.randi(70,120);
      const dx=t.px-e.x, dy=t.py-e.y, d=Math.hypot(dx,dy)||1, sp=3.3;
      t.ebullets.push({x:e.x,y:e.y,vx:dx/d*sp,vy:dy/d*sp,r:6}); } } }
  t.enemies=t.enemies.filter(e=>e.hp>0 && e.y<H+60 && e.x>-260 && e.x<W+260);
  for(const b of t.ebullets){ b.x+=b.vx; b.y+=b.vy; }
  t.ebullets=t.ebullets.filter(b=>b.y<H+20 && b.y>-40 && b.x>-40 && b.x<W+40);
  // boss (per-kind movement + attacks)
  if(t.boss){ const bo=t.boss; bo.t++;
    if(bo.enter>0){ bo.enter--; bo.y=U.lerp(-bo.h/2, H*0.20, 1-bo.enter/70); }
    else {
      if(bo.hitFlash>0) bo.hitFlash--;
      if(bo.kind==='carrier'){ bo.x=W/2+Math.sin(bo.t*0.02)*W*0.28;
        bo.fireCd--; if(bo.fireCd<=0){ bo.fireCd=26; for(let k=-2;k<=2;k++) t.ebullets.push({x:bo.x,y:bo.y+bo.h/2,vx:k*1.7,vy:4.3,r:7}); } }
      else if(bo.kind==='saucer'){ bo.x=W/2+Math.sin(bo.t*0.03)*W*0.18; bo.y=H*0.20+Math.sin(bo.t*0.05)*20; bo.ang+=0.22;
        bo.fireCd--; if(bo.fireCd<=0){ bo.fireCd=8; for(let k=0;k<3;k++){ const a=bo.ang+k*2.094; t.ebullets.push({x:bo.x,y:bo.y,vx:Math.cos(a)*3.4,vy:Math.sin(a)*3.4+1.2,r:6}); } } }
      else { // destroyer: sweeps, twin turrets fire aimed bursts
        bo.x=W/2+Math.sin(bo.t*0.016)*W*0.30;
        bo.fireCd--; if(bo.fireCd<=0){ bo.fireCd=34;
          for(const tx of [bo.x-bo.w*0.33, bo.x+bo.w*0.33]){ const dx=t.px-tx, dy=t.py-(bo.y+bo.h/2), d=Math.hypot(dx,dy)||1, sp=4.2;
            for(let s=-1;s<=1;s++){ const a=Math.atan2(dy,dx)+s*0.18; t.ebullets.push({x:tx,y:bo.y+bo.h/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:6}); } } } }
    } }
  // player bullets vs enemies / boss
  for(const b of t.pbullets){ if(b.life<=0) continue;
    for(const e of t.enemies){ if(e.hp<=0) continue;
      if(Math.abs(b.x-e.x)<e.r+5 && Math.abs(b.y-e.y)<e.r+5){ b.life=0; e.hp--; e.hitFlash=5;
        burst(b.x,b.y,3,'#fff',{smax:3,lmax:14}); if(e.hp<=0) killTop(e); break; } }
    if(b.life>0 && t.boss && t.boss.enter<=0){ const bo=t.boss;
      if(Math.abs(b.x-bo.x)<bo.w/2 && Math.abs(b.y-bo.y)<bo.h/2){ b.life=0; bo.hp--; bo.hitFlash=4;
        burst(b.x,b.y,4,'#ffcf5a',{smax:4}); if(bo.hp<=0) bossDownTop(); } } }
  t.pbullets=t.pbullets.filter(b=>b.life>0);
  // player vs enemies / enemy bullets / boss
  for(const e of t.enemies){ if(e.hp<=0) continue;
    if(Math.abs(t.px-e.x)<e.r+12 && Math.abs(t.py-e.y)<e.r+12){ damage(); e.hp--; e.hitFlash=5; if(e.hp<=0) killTop(e); } }
  for(let i=t.ebullets.length-1;i>=0;i--){ const b=t.ebullets[i];
    if(Math.abs(t.px-b.x)<b.r+10 && Math.abs(t.py-b.y)<b.r+10){ t.ebullets.splice(i,1); damage(); } }
  if(t.boss && t.boss.enter<=0){ const bo=t.boss; if(Math.abs(t.px-bo.x)<bo.w/2+8 && Math.abs(t.py-bo.y)<bo.h/2+8) damage(); }
  // survival score + combo decay + music
  game.score+=0.4;
  if(game.comboT>0){ game.comboT--; if(game.comboT<=0) game.combo=Math.floor(game.combo*0.5); }
  game.mult=1+game.combo*0.15; Audio.setIntensity(0.95);
  // end: boss cleared, or safety cap reached
  const cleared = t.bossSpawned && !t.boss && t.enemies.length===0;
  if(cleared || t.t>t.hardCap) beginFlipOut();
}

// ---- render: top-down field ----
function drawTopHeli(x,y){ ctx.save(); ctx.translate(x,y);
  if(game.iframe>0 && (anim%6<3)) ctx.globalAlpha=0.4;
  ctx.fillStyle='#c11a17'; ctx.fillRect(-3,15,6,13);                 // tail boom
  ctx.fillStyle='#e52521'; ctx.beginPath(); ctx.ellipse(0,0,13,20,0,0,7); ctx.fill();   // body
  ctx.fillStyle='#c11a17'; ctx.fillRect(-4,-26,8,10);               // nose
  ctx.fillStyle='#5c94fc'; ctx.beginPath(); ctx.arc(0,-6,5,0,7); ctx.fill();  // cockpit
  const a=anim*0.9; ctx.strokeStyle='rgba(225,225,235,0.85)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(Math.cos(a)*24,Math.sin(a)*24); ctx.lineTo(-Math.cos(a)*24,-Math.sin(a)*24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(Math.cos(a+1.57)*24,Math.sin(a+1.57)*24); ctx.lineTo(-Math.cos(a+1.57)*24,-Math.sin(a+1.57)*24); ctx.stroke();
  if(game.shield>0){ ctx.save(); ctx.globalCompositeOperation='lighter'; drawGlow(0,0,46,'#7cf0ff',0.4+0.2*Math.sin(anim*0.3)); ctx.restore();
    ctx.strokeStyle='#7cf0ff'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,27,0,7); ctx.stroke(); }
  ctx.globalAlpha=1; ctx.restore();
}
function drawTopEnemy(e){ ctx.save(); ctx.translate(e.x,e.y); const f=e.hitFlash>0; const c=f?'#fff':e.col;
  if(e.type==='tank'){ ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(0,e.r); ctx.lineTo(e.r,0); ctx.lineTo(0,-e.r); ctx.lineTo(-e.r,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#1a1030'; ctx.fillRect(-e.r*0.5,-e.r*0.5,e.r,e.r); }
  else if(e.type==='orbiter'){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(0,0,e.r,0,7); ctx.fill();
    ctx.fillStyle='#06203a'; ctx.beginPath(); ctx.arc(0,0,e.r*0.45,0,7); ctx.fill(); }
  else if(e.type==='kamikaze'){ ctx.fillStyle=(anim%10<5)?'#fff':c; ctx.beginPath(); ctx.moveTo(0,e.r+3); ctx.lineTo(e.r*0.7,-e.r*0.7); ctx.lineTo(-e.r*0.7,-e.r*0.7); ctx.closePath(); ctx.fill(); }
  else if(e.type==='gunner'){ ctx.fillStyle=c; ctx.fillRect(-e.r,-e.r*0.7,e.r*2,e.r*1.4);
    ctx.fillStyle='#3a2a00'; ctx.fillRect(-4,e.r*0.4,8,e.r*0.6); }
  else { ctx.fillStyle=c; ctx.beginPath(); ctx.moveTo(0,e.r); ctx.lineTo(e.r*0.85,-e.r*0.8); ctx.lineTo(0,-e.r*0.4); ctx.lineTo(-e.r*0.85,-e.r*0.8); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(0,-e.r*0.1,e.r*0.22,0,7); ctx.fill(); }
  if(e.maxhp>2){ ctx.fillStyle='#000a'; ctx.fillRect(-e.r,e.r+3,e.r*2,4); ctx.fillStyle='#3cff6a'; ctx.fillRect(-e.r,e.r+3,e.r*2*(e.hp/e.maxhp),4); }
  ctx.restore(); }
function drawTopPickup(p){ ctx.save(); ctx.translate(p.x,p.y);
  const gun=p.kind==='gun'; const col=gun?'#ffd21e':'#39e0ff'; const dark=gun?'#6b4300':'#083948';
  const pulse=0.5+0.5*Math.sin(p.t*0.18), bob=Math.sin(p.t*0.14)*2;
  ctx.translate(0,bob);
  // soft glow so it clearly pops as a collectible, not a projectile
  ctx.save(); ctx.globalCompositeOperation='lighter'; drawGlow(0,0,30+7*pulse,col,0.45+0.3*pulse); ctx.restore();
  // rotating dashed capture-ring
  ctx.save(); ctx.rotate(p.t*0.06); ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.setLineDash([6,5]);
  ctx.beginPath(); ctx.arc(0,0,23,0,7); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
  // hexagon badge
  ctx.fillStyle=col; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath(); for(let i=0;i<6;i++){ const a=i*Math.PI/3-Math.PI/2, r=15, x=Math.cos(a)*r, y=Math.sin(a)*r; i?ctx.lineTo(x,y):ctx.moveTo(x,y); } ctx.closePath(); ctx.fill(); ctx.stroke();
  // icon: gun = triple up-chevron (power up); shield = shield + cross
  ctx.strokeStyle=dark; ctx.lineWidth=3; ctx.lineCap='round'; ctx.lineJoin='round';

  else { ctx.fillStyle=dark; ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(8,-5); ctx.lineTo(8,3); ctx.lineTo(0,10); ctx.lineTo(-8,3); ctx.lineTo(-8,-5); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.beginPath(); ctx.moveTo(0,-4); ctx.lineTo(0,6); ctx.moveTo(-4,1); ctx.lineTo(4,1); ctx.stroke(); }
  // floating label so there's zero doubt what it is
  pixText(gun?'GUN UP':'SHIELD', 0, -36, 72, '#ffffff', dark, 10);
  ctx.restore(); }
function drawBossTop(bo){ ctx.save(); ctx.translate(bo.x,bo.y); const f=bo.hitFlash>0;
  if(bo.kind==='saucer'){ ctx.fillStyle=f?'#fff':'#4a5a8a'; ctx.beginPath(); ctx.ellipse(0,0,bo.w/2,bo.h*0.34,0,0,7); ctx.fill();
    ctx.fillStyle=f?'#fff':'#8fb0ff'; ctx.beginPath(); ctx.ellipse(0,-bo.h*0.12,bo.w*0.26,bo.h*0.26,0,0,7); ctx.fill();
    ctx.fillStyle=(anim%16<8)?'#ff3b3b':'#7a1010'; for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.arc(i*bo.w*0.18,bo.h*0.14,5,0,7); ctx.fill(); } }
  else if(bo.kind==='destroyer'){ ctx.fillStyle=f?'#fff':'#3f4a63'; ctx.fillRect(-bo.w/2,-bo.h/2,bo.w,bo.h);

    ctx.fillStyle=f?'#fff':'#6b7896'; for(const tx of [-bo.w*0.33,bo.w*0.33]){ ctx.beginPath(); ctx.arc(tx,bo.h*0.2,18,0,7); ctx.fill(); }
    ctx.fillStyle=(anim%20<10)?'#ff3b3b':'#7a1010'; ctx.beginPath(); ctx.arc(0,-bo.h*0.1,9,0,7); ctx.fill(); }
  else { ctx.fillStyle=f?'#fff':'#556077'; ctx.fillRect(-bo.w/2,-bo.h/2,bo.w,bo.h);

function drawTop(){ const t=game.top; if(!t) return;

// ---- render: the cinematic camera flip ----
function snapScene(drawFn){   // render into the VIRTUAL buffer, capture it at VW×VH
  ctx.setTransform(WS,0,0,WS,0,0); ctx.clearRect(0,0,W,H);
  ctx.save(); drawFn(); ctx.restore();
  const c=document.createElement('canvas'); c.width=VW; c.height=VH;
  const g=c.getContext('2d'); g.imageSmoothingEnabled=false; g.drawImage(vcanvas,0,0); return c;
}
function drawFlipFrame(){
  if(game.flipNeedsCapture){ game.flipNeedsCapture=false;
    if(game.phase==='in'){ game.flipA=snapScene(()=>drawWorld(true)); game.flipB=snapScene(()=>drawTop()); }
    else { game.flipA=snapScene(()=>drawTop()); game.flipB=snapScene(()=>drawWorld(false)); } }
  const going=game.phase==='in';
  let p=U.clamp(1-(game.phaseT/FLIP_TICKS),0,1);      // 0..1 over the flip
  const sp=p*p*(3-2*p);                                // smoothstep — lingers mid-flip
  const img=(sp<0.5)?game.flipA:game.flipB;
  ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.imageSmoothingEnabled=false;
  ctx.fillStyle='#04030c'; ctx.fillRect(0,0,VW,VH);
  // warp starfield rushing past behind the flipping card
  ctx.globalCompositeOperation='lighter';
  const warp=1-Math.abs(sp-0.5)*2;
  for(let i=0;i<48;i++){ const a=(i*137.5)%360*0.01745+anim*0.01, r0=Math.min(VW,VH)*0.05,
      r1=r0+Math.max(VW,VH)*(0.25+0.7*warp)*((i%7)+3)/9;
    ctx.strokeStyle='rgba(150,220,255,'+(0.12+0.3*warp).toFixed(3)+')'; ctx.lineWidth=1+2*warp;
    ctx.beginPath(); ctx.moveTo(VW/2+Math.cos(a)*r0,VH/2+Math.sin(a)*r0); ctx.lineTo(VW/2+Math.cos(a)*r1,VH/2+Math.sin(a)*r1); ctx.stroke(); }
  ctx.globalCompositeOperation='source-over';
  // the pitching card: perspective bulge + a punch-zoom + slight roll for 3D feel
  if(img){ const ang=sp*Math.PI, scaleY=Math.abs(Math.cos(ang)),
      persp=1+0.34*Math.sin(ang), zoom=1+0.16*Math.sin(ang),
      roll=(going?1:-1)*0.10*Math.sin(ang)*(sp<0.5?1:-1);
    ctx.translate(VW/2,VH/2); ctx.rotate(roll); ctx.scale(persp*zoom,scaleY*zoom);
    ctx.drawImage(img,-VW/2,-VH/2,VW,VH); }
  ctx.restore();
  // bright bloom that peaks edge-on (mid-flip), tinted cyan->white
  const flashp=1-Math.abs(sp-0.5)/0.5; if(flashp>0){ const fp=flashp*flashp;
    ctx.save(); ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle='rgba(210,245,255,'+(0.55*fp).toFixed(3)+')'; ctx.fillRect(0,0,VW,VH);
    ctx.fillStyle='rgba(255,255,255,'+(0.5*fp*fp).toFixed(3)+')'; ctx.fillRect(0,0,VW,VH); ctx.restore(); }
  // cue text
  if(sp>0.42){ const msg=going?'GET READY':'RETURN'; pixText(msg, W/2, H*0.5, W*0.7, '#ffffff', '#0a3a55', hudCell(4)); }
}

// advance one sim tick for whichever phase we're in
function phaseStep(){
  if(game.phase==='side'){ step(); }
  else if(game.phase==='top'){ topStep(); }
  else if(game.phase==='in'){ game.phaseT--; game.score+=0.2;
    if(game.phaseT<=0){ game.phase='top'; game.iframe=Math.max(game.iframe,(900/Config.DT)|0); } }
  else if(game.phase==='out'){ game.phaseT--; if(game.phaseT<=0) endBonusStage(); }
}

// ============================================================ INPUT
const Input = { fly:false, fire:false };
function press(fly){ Audio.ensure(); idleT=0;
  if(fx) return;
  if(mode==='boot'){ startTransition(MODE.TITLE); return; }
  if(mode==='attract'){ startTransition(MODE.TITLE); return; }
  if(mode===MODE.TITLE){ insertFrom='title'; insertT=0; mode='insert'; Audio.SFX.coinInsert(); return; }
  if(mode===MODE.DEAD){ const fs=Math.floor(game.score);
    if(qualifies(fs)){ startEntry(fs); Audio.SFX.coinInsert(); }
    else { insertFrom='dead'; insertT=0; mode='insert'; Audio.SFX.coinInsert(); } return; }
  if(mode===MODE.GARAGE){ return; }
  if(mode===MODE.PLAYING && fly) Input.fly=true;
}
function release(){ Input.fly=false; }
window.addEventListener('keydown', e=>{
  idleT=0;
  if(mode==='entry'){ e.preventDefault();
    if(e.key==='ArrowUp') entryInput('up'); else if(e.key==='ArrowDown') entryInput('down');
    else if(e.key==='ArrowLeft') entryInput('left'); else if(e.key==='ArrowRight') entryInput('right');
    else if(e.key==='Enter'||e.code==='Space') entryInput('ok'); return; }
  if(mode===MODE.PLAYING && game.phase==='top'){
    const k=e.key;
    if(k==='ArrowUp'||k==='w'||k==='W'){ keyMove.up=true; Aim.active=false; e.preventDefault(); return; }
    if(k==='ArrowDown'||k==='s'||k==='S'){ keyMove.down=true; Aim.active=false; e.preventDefault(); return; }
    if(k==='ArrowLeft'||k==='a'||k==='A'){ keyMove.left=true; Aim.active=false; e.preventDefault(); return; }
    if(k==='ArrowRight'||k==='d'||k==='D'){ keyMove.right=true; Aim.active=false; e.preventDefault(); return; }
    if(k==='p'||k==='P'){ mode='paused'; return; }
    if(k==='m'||k==='M'){ Settings.muted=!Settings.muted; Save.set('muted',Settings.muted); Audio.setMuted(Settings.muted); return; }
    if(k==='`'){ Settings.showFps=!Settings.showFps; }
    return;
  }
  if(e.code==='Space'||e.key==='ArrowUp'){ e.preventDefault(); if(!e.repeat) press(true); else if(mode===MODE.PLAYING) Input.fly=true; }
  else if(e.key==='f'||e.key==='F'){ if(mode===MODE.PLAYING) Input.fire=true; }
  else if(e.key==='p'||e.key==='P'){ if(mode===MODE.PLAYING) mode='paused'; else if(mode==='paused') mode=MODE.PLAYING; }
  else if(e.key==='m'||e.key==='M'){ Settings.muted=!Settings.muted; Save.set('muted',Settings.muted); Audio.setMuted(Settings.muted); }
  else if(e.key==='g'||e.key==='G'){ if(mode===MODE.TITLE) mode=MODE.GARAGE; else if(mode===MODE.GARAGE) mode=MODE.TITLE; }
  else if(e.key==='`'){ Settings.showFps=!Settings.showFps; }
});
window.addEventListener('keyup', e=>{
  const k=e.key;
  if(k==='ArrowUp'||k==='w'||k==='W') keyMove.up=false;
  else if(k==='ArrowDown'||k==='s'||k==='S') keyMove.down=false;
  else if(k==='ArrowLeft'||k==='a'||k==='A') keyMove.left=false;
  else if(k==='ArrowRight'||k==='d'||k==='D') keyMove.right=false;
  if(e.code==='Space'||e.key==='ArrowUp'){ e.preventDefault(); release(); }
  else if(e.key==='f'||e.key==='F'){ Input.fire=false; }
});
canvas.addEventListener('mousemove', e=>{ Aim.x=e.clientX; Aim.y=e.clientY; Aim.active=true; });
canvas.addEventListener('mousedown', e=>{ e.preventDefault();
  if(e.button===2){ if(mode===MODE.PLAYING) Input.fire=true; return; }
  if(mode===MODE.GARAGE){ garageClick(toWX(e.clientX),toWY(e.clientY)); return; }
  if(mode===MODE.TITLE){ // check garage button hotspot
    if(titleGarageHot(toWX(e.clientX),toWY(e.clientY))){ mode=MODE.GARAGE; Audio.ensure(); Audio.SFX.blip(); return; } }
  press(true);
});
window.addEventListener('mouseup', e=>{ if(e.button===2){ Input.fire=false; } else release(); });
canvas.addEventListener('contextmenu', e=>e.preventDefault());
// iPad / touch: hold to rise, release to fall, DOUBLE-TAP to shoot
let canvasTouches=0, lastTapT=0;
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); Audio.ensure(); idleT=0;
  const t=e.changedTouches[0];
  canvasTouches += e.changedTouches.length;
  if(mode==='entry'){ entryTouch(toWX(t.clientX),toWY(t.clientY)); return; }
  if(mode==='boot'||mode==='attract'){ startTransition(MODE.TITLE); return; }
  if(mode===MODE.GARAGE){ garageClick(toWX(t.clientX),toWY(t.clientY)); return; }
  if(mode===MODE.TITLE){ if(titleGarageHot(toWX(t.clientX),toWY(t.clientY))){ mode=MODE.GARAGE; Audio.SFX.blip(); return; } press(true); return; }
  if(mode===MODE.DEAD){ press(true); return; }
  if(mode==='paused'){ mode=MODE.PLAYING; return; }
  if(mode===MODE.PLAYING && game.phase==='top'){ Aim.x=t.clientX; Aim.y=t.clientY; Aim.active=true; return; }
  if(mode===MODE.PLAYING){
    const now=performance.now();
    if(now-lastTapT<300){ game.fireBurst=16; }   // double-tap = shoot burst
    lastTapT=now;
    Input.fly=true;                               // hold = rise
  }
}, {passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault();
  canvasTouches=Math.max(0, canvasTouches-e.changedTouches.length);
  if(canvasTouches===0) Input.fly=false;          // release = fall
}, {passive:false});
canvas.addEventListener('touchcancel', e=>{ canvasTouches=0; Input.fly=false; }, {passive:false});
canvas.addEventListener('touchmove', e=>{ if(mode===MODE.PLAYING && game.phase==='top'){ e.preventDefault();
  const t=e.changedTouches[0]; Aim.x=t.clientX; Aim.y=t.clientY; Aim.active=true; } }, {passive:false});
// on-screen FIRE button (extra option on tablets/phones)
fireBtn.addEventListener('touchstart', e=>{ e.preventDefault(); if(mode===MODE.PLAYING) Input.fire=true; }, {passive:false});
fireBtn.addEventListener('touchend', e=>{ e.preventDefault(); Input.fire=false; }, {passive:false});
// on-screen MUTE button (touch devices have no keyboard)

// ============================================================ DRAW: WORLD
function biome(){ return BIOMES[game.biome||0]; }
let starField=null;
function ensureStars(){ if(starField) return; starField=[]; for(let i=0;i<80;i++) starField.push({x:Math.random(),y:Math.random(),s:U.rand(1,2.5),p:Math.random()*7}); }

// ===================== PIXEL SPRITES =====================
// Each sprite is baked once to an offscreen canvas at its native virtual size, then blitted
// crisply (nearest-neighbor, integer position) via spr(). Geometric/biome-tinted things
// (pipes, saw, borders, sky, laser, bullets) are drawn as crisp integer pixel-rects instead.
function mk(w,h,draw){ const c=document.createElement('canvas'); c.width=w; c.height=h;
  const g=c.getContext('2d'); g.imageSmoothingEnabled=false; draw(g,w,h); return c; }
function P(g,x,y,w,h,col){ g.fillStyle=col; g.fillRect(x|0,y|0,Math.max(1,w|0),Math.max(1,h|0)); }
function disc(g,cx,cy,r,col){ g.fillStyle=col; g.beginPath(); g.arc(cx,cy,r,0,7); g.fill(); }
function tint(img,col){ const c=mk(img.width,img.height,g=>{ g.drawImage(img,0,0);
  g.globalCompositeOperation='source-in'; g.fillStyle=col; g.fillRect(0,0,img.width,img.height); }); return c; }
function rotFrames(img,n){ const s=Math.max(img.width,img.height)+2,out=[];
  for(let i=0;i<n;i++) out.push(mk(s,s,g=>{ g.translate(s/2,s/2); g.rotate(i/n*Math.PI*2); g.drawImage(img,-img.width/2,-img.height/2); }));
  return out; }
// world -> virtual (identity space) with camera shake folded in
function vX(x){ return Math.round((x+Cam.x)*WS); }
function vY(y){ return Math.round((y+Cam.y)*WS); }
function spr(img,wx,wy){ ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(img, vX(wx)-(img.width>>1), vY(wy)-(img.height>>1)); ctx.restore(); }
function sprAlpha(img,wx,wy,a){ ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.imageSmoothingEnabled=false;
  ctx.globalAlpha=a; ctx.drawImage(img, vX(wx)-(img.width>>1), vY(wy)-(img.height>>1)); ctx.restore(); }

    g.fillStyle=COL.cy; g.beginPath(); g.moveTo(4.5,0.5); g.lineTo(4.5,4.5); g.lineTo(1.5,4.5); g.closePath(); g.fill(); P(g,3,2,1,1,COL.w); });

function drawPipe(o,b){ ctx.save(); ctx.setTransform(1,0,0,1,0,0);
  const x=vX(o.x), y=vY(o.drawY), w=Math.max(3,Math.round(o.w*WS)), h=Math.max(2,vY(o.drawY+o.h)-y);

  P(ctx,x,y,w,1,b.pipeDark); P(ctx,x,y+h-1,w,1,b.pipeDark); P(ctx,x,y,1,h,b.pipeDark); P(ctx,x+w-1,y,1,h,b.pipeDark);
  const capH=Math.max(4,Math.round(11*WS)), ov=Math.max(1,Math.round(5*WS));
  const cy=o.fromTop? y+h-capH : y;
  P(ctx,x-ov,cy,w+ov*2,capH,b.pipe); P(ctx,x-ov+1,cy,2,capH,b.pipeLite); P(ctx,x+w+ov-3,cy,2,capH,b.pipeDark);
  P(ctx,x-ov,cy,w+ov*2,1,b.pipeDark); P(ctx,x-ov,cy+capH-1,w+ov*2,1,b.pipeDark);
