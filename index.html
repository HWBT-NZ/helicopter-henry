  // trails row
  pixText('TRAILS', W/2, H*0.66, W*0.3, '#ffe14d','#000',3);
  const trTop=H*0.75, trH=Math.min(60,H*0.09), tw=Math.min(200,W*0.2), tgap=14;
  const twTot=Config.TRAILS.length*(tw+tgap)-tgap; let tx=W/2-twTot/2;
  Config.TRAILS.forEach(tr=>{ const owned=Save.get('trails').includes(tr.id); const sel=Save.get('trail')===tr.id;
    ctx.fillStyle=sel?'#3a2f6b':'#1a2440'; ctx.fillRect(tx,trTop,tw,trH);
    ctx.strokeStyle=sel?'#ffe14d':'#33406b'; ctx.lineWidth=3; ctx.strokeRect(tx,trTop,tw,trH);
    pixText(tr.name, tx+tw/2, trTop+trH*0.14, tw*0.8, '#fff','#000',2);
    pixText(owned?(sel?'EQUIPPED':'EQUIP'):tr.cost+'c', tx+tw/2, trTop+trH*0.58, tw*0.8, owned?'#7cf07c':(Save.get('coins')>=tr.cost?'#7cf07c':'#f88'),'#000',2);
    garageRects.push({x:tx,y:trTop,w:tw,h:trH,trail:tr.id,cost:tr.cost,owned});
    tx+=tw+tgap; });
  pixText(IS_MOBILE?'TAP HERE TO GO BACK':'BACK (G / CLICK HERE)', W/2, H*0.92, W*0.6, '#fff','#1a3a8f',3);
  garageRects.push({x:0,y:H*0.89,w:W,h:H*0.11,back:true});
}
function garageClick(mx,my){
  for(const r of garageRects){
    if(mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h){
      if(r.back){ mode=MODE.TITLE; Audio.SFX.blip(); return; }
      if(r.id){ if(r.maxed) return; if(Save.get('coins')>=r.cost){ Save.set('coins',Save.get('coins')-r.cost);
        const up=Save.all().upgrades; up[r.id]=(up[r.id]||0)+1; Save.set('upgrades',up); Audio.SFX.power(); } else Audio.SFX.blip(); return; }
      if(r.trail){ if(r.owned){ Save.set('trail',r.trail); Audio.SFX.blip(); }
        else if(Save.get('coins')>=r.cost){ Save.set('coins',Save.get('coins')-r.cost); const tr=Save.get('trails'); tr.push(r.trail); Save.set('trails',tr); Save.set('trail',r.trail); Audio.SFX.power(); } else Audio.SFX.blip(); return; }
    }
  }
}

function drawGameOver(inserting){
  ctx.fillStyle='rgba(0,10,50,0.55)'; ctx.fillRect(0,0,W,H);
  const fs=Math.floor(game.score); let y=H*0.13;
  const g=pixText('GAME OVER', W/2, y, W*0.7, '#ffe14d', '#b71c07', 8); y+=g.h+g.cell*3;
  pixText('SCORE '+fs, W/2, y, W*0.45, '#fff', '#1a3a8f', 5); y+=20*5+16;
  const isBest=fs>=Save.get('best');
  pixText(isBest?'NEW BEST!':'BEST '+Save.get('best'), W/2, y, W*0.45, isBest?'#7cf07c':'#9fd0ff', '#0a3a0a', 5); y+=20*5+16;
  pixText('DIST '+Math.floor(game.dist)+'   COINS '+Save.get('coins'), W/2, y, W*0.5, '#ffe14d','#000',3);
  drawCoinSlot(W/2, H*0.64, inserting);
  if(!inserting && Math.floor(anim/18)%2===0) pixText(IS_MOBILE?'TAP TO CONTINUE':'SPACE/CLICK = CONTINUE', W/2, H*0.86, W*0.66, '#fff', '#1a3a8f', 4);
}

// ============================================================ META: boot / transitions / hi-scores / attract
function drawBoot(){ ctx.save(); ctx.setTransform(1,0,0,1,0,0); P(ctx,0,0,VW,VH,'#0a0a12'); ctx.restore();
  const on=bootT>28;
  pixText('HELICOPTER', W/2, H*0.34, W*0.66, on?'#ffe14d':'#5a4a10', '#b71c07', 6);
  pixText('HENRY', W/2, H*0.50, W*0.36, on?'#ffe14d':'#5a4a10', '#b71c07', 6);
  if(bootT>52) pixText('HWBT-NZ', W/2, H*0.72, W*0.28, '#5c94fc', '#000', 3);
  ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.globalAlpha=0.12; ctx.fillStyle='#fff';
  ctx.fillRect(0,(bootT*5)%(VH+10),VW,2); ctx.globalAlpha=1; ctx.restore(); }
function drawFX(){ if(!fx) return; const p=fx.t/fx.dur, a=p<0.5?p*2:(1-p)*2;
  ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.globalAlpha=a; P(ctx,0,0,VW,VH,'#000'); ctx.globalAlpha=1; ctx.restore();
  if(!fx.half && p>=0.5){ fx.half=true; fx.onMid(); }
  fx.t++; if(fx.t>fx.dur) fx=null; }

function drawScores(topY, n){ const l=Save.get('scores')||[];
  pixText('HI-SCORES', W/2, topY, W*0.5, '#ffe14d', '#b71c07', 4);
  let y=topY+70; for(let i=0;i<Math.min(n,l.length);i++){ const s=l[i];
    const row=(i+1)+'  '+s.n+'  '+String(s.s);
    pixText(row, W/2, y, W*0.55, i===0?'#fff':'#9fd0ff', '#000', 3); y+=70; } }

function qualifies(fs){ const l=Save.get('scores')||[]; return fs>0 && (l.length<10 || fs>l[l.length-1].s); }
const CHARS='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.!-';
function startEntry(fs){ entry={i:[7,4,13], col:0, score:fs}; mode='entry'; }   // default "HEN"
function entryInput(a){ if(!entry) return;
  if(a==='up') entry.i[entry.col]=(entry.i[entry.col]+1)%CHARS.length;
  else if(a==='down') entry.i[entry.col]=(entry.i[entry.col]+CHARS.length-1)%CHARS.length;
  else if(a==='left') entry.col=(entry.col+2)%3;
  else if(a==='right') entry.col=(entry.col+1)%3;
  else if(a==='ok'){ if(entry.col<2) entry.col++; else commitScore(); }
  Audio.ensure(); Audio.SFX.blip(); }
function commitScore(){ const name=entry.i.map(k=>CHARS[k]).join('');
  const l=Save.get('scores')||[]; l.push({n:name, s:entry.score}); l.sort((a,b)=>b.s-a.s); if(l.length>10) l.length=10;
  Save.set('scores', l); entry=null; Audio.SFX.power(); startTransition(MODE.TITLE); }
function entryTouch(wx,wy){ if(!entry) return; const cw=W*0.13;
  for(let c=0;c<3;c++){ const x=W/2+(c-1)*cw; if(Math.abs(wx-x)<cw*0.5 && wy>H*0.34 && wy<H*0.62){ entry.col=c; entryInput(wy<H*0.48?'up':'down'); return; } }
  if(wy>H*0.72) entryInput('ok'); }
function drawEntry(){ if(!entry) return; ctx.fillStyle='rgba(0,8,40,0.72)'; ctx.fillRect(0,0,W,H);
  pixText('NEW HIGH SCORE!', W/2, H*0.1, W*0.82, '#ffe14d', '#b71c07', 6);
  pixText('SCORE '+entry.score, W/2, H*0.24, W*0.4, '#fff', '#1a3a8f', 4);
  const cw=W*0.13;
  for(let c=0;c<3;c++){ const x=W/2+(c-1)*cw, ch=CHARS[entry.i[c]], sel=c===entry.col;
    if(sel){ pixText('^', x, H*0.34, cw*0.5, '#ffe14d','#000',4); pixText('.', x, H*0.6, cw*0.5, '#ffe14d','#000',4); }
    pixText(ch, x, H*0.4, cw*0.72, sel?'#ffe14d':'#fff', '#000', 8); }
  pixText(IS_MOBILE?'TAP UP/DOWN THEN OK':'ARROWS  +  ENTER', W/2, H*0.68, W*0.7, '#9fd0ff','#000',3);
  if(IS_MOBILE) pixText('[ OK ]', W/2, H*0.78, W*0.3, '#7cf07c','#000',4); }

function autopilot(){
  let nx=1e9; for(const o of game.obstacles){ if(o.kind==='pipe' && o.x>game.hx-10 && o.x<nx) nx=o.x; }
  let target=H/2;
  if(nx<1e9){ let topEnd=Config.BORDER, botStart=H-Config.BORDER;
    for(const o of game.obstacles){ if(o.kind==='pipe' && Math.abs(o.x-nx)<60){ if(o.fromTop) topEnd=Math.max(topEnd,o.drawY+o.h); else botStart=Math.min(botStart,o.drawY); } }
    target=(topEnd+botStart)/2; }
  for(const o of game.obstacles){ if(o.kind==='saw' && o.x>game.hx && o.x<game.hx+W*0.22 && Math.abs(o.drawY-game.hy)<80) target+=(game.hy<o.drawY?-1:1)*90; }
  target=U.clamp(target, Config.BORDER+40, H-Config.BORDER-40);
  const fly=game.hy>target+6;
  let fire=false; for(const e of game.baddies){ if(e.hp>0 && e.x>game.hx && e.x<game.hx+W*0.6 && Math.abs(e.y-game.hy)<52){ fire=true; break; } }
  return {fly,fire}; }
function startAttract(){ resetRun(); game.demo=true; game.launched=true; mode='attract'; acc=0; last=performance.now(); idleT=0; }

// ============================================================ OVERLAY FX
function drawFlashVignette(){
  if(flash>0.01){ ctx.fillStyle=flashCol; ctx.globalAlpha=flash*0.5; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
  if(Settings.crt && !Settings.reduceFx){
    const g=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.7);
    g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.35)'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
}

// ============================================================ FPS / GOVERNOR
let fpsAcc=0, fpsCount=0, fps=60, slowStreak=0;
function drawFps(){ pixText('FPS '+Math.round(fps)+'  P '+Particles.count()+'/'+Particles.cap(), 24, H-26, 260, '#0f0', '#000', 2, 'left'); }

// ============================================================ MAIN LOOP
let last=performance.now();
function loop(now){
  let real=now-last; last=now; real=Math.min(real,250);
  anim++;
  // fps
  fpsAcc+=real; fpsCount++; if(fpsAcc>=500){ fps=1000/(fpsAcc/fpsCount); fpsAcc=0; fpsCount=0;
    if(fps<48){ slowStreak++; if(slowStreak>=2){ Particles.setCap(Particles.cap()*0.75|0); if(fps<40) Settings.crt=false; } } else slowStreak=0; }

  // timers (real time, outside sim)
  if(hitstopT>0) hitstopT-=real; if(slowmoT>0) slowmoT-=real;
  timeScale = hitstopT>0 ? 0 : (slowmoT>0 ? 0.4 : 1);
  Audio.slowmo(slowmoT>0);
  if(flash>0) flash=Math.max(0,flash-real*0.003);
  Cam.update(real);

  // sim
  if(mode===MODE.PLAYING || mode==='attract'){
    if(mode==='attract'){ const ap=autopilot(); Input.fly=ap.fly; Input.fire=ap.fire; }
    acc += real*timeScale;
    let steps=0;
    while(acc>=Config.DT && steps<6){ phaseStep(); acc-=Config.DT; steps++; if(mode!==MODE.PLAYING && mode!=='attract') break; }
    Particles.update(); driftClouds();
    Audio.rotor(game.vy, Input.fly);
  } else if(mode==='insert'){
    driftClouds(); Particles.update();
    insertT++; if(insertT>=34){ startPlay(); }
  } else if(mode==='boot'){
    driftClouds(); bootT++; if(bootT>96 && !fx) startTransition(MODE.TITLE);
  } else {
    driftClouds(); if(mode===MODE.DEAD||mode==='paused'||mode==='entry') Particles.update();
  }
  // demo (attract) death -> fade back to title
  if(mode===MODE.DEAD && game.demo){ Input.fly=false; Input.fire=false; if(!fx) startTransition(MODE.TITLE); }
  // title idle -> attract demo
  if(mode===MODE.TITLE){ idleT++; if(idleT>540 && !fx) startAttract(); }

  // title music on menu screens (starts once audio is unlocked)
  if(mode===MODE.TITLE || mode===MODE.GARAGE || mode==='attract' || mode==='entry' || (mode==='insert'&&insertFrom==='title')) Audio.playTitle();
  else Audio.stopTitle();

  // ---------- render ----------
  ctx.setTransform(WS,0,0,WS,0,0);   // world -> virtual buffer
  ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.translate(Cam.x,Cam.y);
  if(mode===MODE.PLAYING||mode==='paused'||mode==='attract'){
    if(game.phase==='top') drawTop();
    else if(game.phase==='in'||game.phase==='out') drawFlipFrame();
    else drawWorld(true);
  }
  else if(mode===MODE.DEAD||mode==='entry'){
    if(game.phase==='top') drawTop();
    else if(game.phase==='in'||game.phase==='out') drawFlipFrame();
    else drawWorld(false);
  }
  else if(mode===MODE.TITLE){ drawTitle(); }
  else if(mode===MODE.GARAGE){ /* drawn below without shake */ }
  else if(mode==='insert'){ if(insertFrom==='title') drawTitle(); else drawWorld(false); }
  ctx.restore();

  // HUD / overlays (no shake)
  if(mode===MODE.PLAYING||mode==='paused'||mode==='attract'){ drawHUD();
    if(mode==='paused'){ ctx.fillStyle='#0008'; ctx.fillRect(0,0,W,H); pixText('PAUSED', W/2, H/2-40, W*0.4, '#fff','#000',7); pixText('P = RESUME', W/2, H/2+40, W*0.3, '#fff','#000',3); }
    if(mode==='attract'){ pixText('DEMO', W/2, H*0.08, W*0.2, '#fff','#000',4);
      if(Math.floor(anim/16)%2===0) pixText(IS_MOBILE?'TAP TO PLAY':'INSERT COIN  -  PRESS SPACE', W/2, H*0.9, W*0.7, '#ffe14d','#b71c07',4); } }
  else if(mode===MODE.DEAD){ drawGameOver(false); }
  else if(mode==='entry'){ drawEntry(); }
  else if(mode==='boot'){ drawBoot(); }
  else if(mode===MODE.GARAGE){ drawGarage(); }
  else if(mode==='insert'){ const slotY=insertFrom==='title'?H*0.60:H*0.64;
    if(insertFrom==='dead') drawGameOver(true); else { /* title slot already drawn */ drawCoinSlot(W/2,slotY,true); }
    const p=Math.min(1,insertT/20), e=U.ease(p); const cy=(slotY-170)+((slotY-18)-(slotY-170))*e;
    if(insertT<26) drawCoin(W/2,cy,12); }

  drawFlashVignette();
  drawFX();
  if(Settings.showFps) drawFps();

  // integer-scale the virtual back-buffer onto the display
  blit();

  // touch FIRE button only appears while actually playing (avoids dead clutter on menus)
  if(IS_MOBILE) fireBtn.style.display = ((mode===MODE.PLAYING || mode==='paused') && game.phase==='side') ? 'flex' : 'none';

  requestAnimationFrame(loop);
}
let acc=0;
function startPlay(){ resetRun(); mode=MODE.PLAYING; Input.fly=false; acc=0; last=performance.now();
  Audio.ensure(); Audio.stopTitle(); Audio.setSong(0); Audio.startMusic(); Audio.startRotor(); Audio.setIntensity(0); lastMid=H/2; }

// ============================================================ BOOT
buildSprites();
seedClouds();
resetRun();
mode='boot';                 // boot sting -> fade -> title
requestAnimationFrame(loop);

})();
</script>
